<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; font-family: 'Pretendard', -apple-system, sans-serif; color: #cbd5e1; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, ChevronDown, ChevronLeft, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Settings, Calendar, GitMerge, Plus, PlusCircle, Trash2, 
      Image as ImageIcon, ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, 
      X, User, ExternalLink, Monitor, Layout, Type, RectangleHorizontal, FileText
    } from 'lucide-react';

    // --- Specifications & Templates ---
    const BANNER_SPECS = [
      { type: 'TODAY_BTV', name: 'Today B tv', icon: MonitorPlay, ratio: '16:9', size: '3840 x 2160', desc: '홈 최상단 대형 배너. 75% 이미지 배치.' },
      { type: 'GENERAL_BANNER', name: '일반 배너 (1/2/3단)', icon: LayoutPanelLeft, ratio: '가변', size: '1단/2단/3단', desc: '배경 프리뷰(좌/우)와 하단 배너 카드(내/외)가 세트로 구성됩니다.' },
      { type: 'BIG_BANNER', name: '빅배너', icon: Monitor, ratio: '24.5:8.3', size: '2880 x 1234', desc: '텍스트(좌)와 이미지(우)로 구성된 대형 프로모션 영역.' },
      { type: 'LONG_BANNER', name: '롱배너', icon: Smartphone, ratio: '129:181.5', size: '800 x 1600', desc: '세로형 긴 배너. 카피 가독성이 매우 중요함.' },
      { type: 'STRIP_BANNER', name: '띠배너', icon: RectangleHorizontal, ratio: '397:65.5', size: '가변', desc: '콘텐츠 사이 삽입되는 가로형 긴 띠배너.' }
    ];

    const DEFAULT_TODAY_BTV = {
      topText: '상단 문구', mainTitle: '메인 문구', subText: '서브 텍스트', 
      landingValue: 'UI_PATH: /join', buttonText: '자세히 보기', imageUrl: '', gnb: '홈 최상단', note: ''
    };

    // 3번 요청 반영: 서브글 기본 문구 수정
    const DEFAULT_GENERAL_BANNER = {
      colType: '2단', 
      previewTitle: '배경 좌상단 텍스트 (1줄)', previewSub: '서브 설명글 영역\n2줄에서 3줄 정도 작성 요망\n예시입니다', previewImg: '',
      bannerCopy: '배너 내 텍스트\n(생략 가능)', bannerImg: '',
      landingValue: 'UI_PATH: /join', gnb: '영화 > 신작', note: ''
    };

    const DEFAULT_BIG_BANNER = {
      mainTitle: '메인 문구', subTitle: '서브 타이틀', desc: '상세 설명글을 입력해주세요.', 
      buttonText: '바로가기', imageUrl: '', landingValue: 'UI_PATH: /join', gnb: '홈', note: ''
    };

    const DEFAULT_LONG_BANNER = {
      copy: '세로형 배너 카피', imageUrl: '', landingValue: 'UI_PATH: /join', note: ''
    };

    const DEFAULT_STRIP_BANNER = {
      mainTitle: '메인 이벤트 타이틀', subTitle: '서브 프로모션 텍스트', imageUrl: '', landingValue: 'UI_PATH: /join', gnb: '이벤트', note: ''
    };

    // --- BlockRenderer (프리뷰 및 폼 구성 코어) ---
    const BlockRenderer = ({ block, onUpdate, readOnly = false }) => {
      if (!block) return null;
      const [localShowSafeZone, setLocalShowSafeZone] = useState(true);

      const checkIsUrl = (str) => Boolean(str && typeof str === 'string' && str.startsWith('http'));
      const checkHasText = (str) => Boolean(str && !checkIsUrl(str) && str.trim() !== '');

      // 텍스트 대체 UI 일괄 적용을 위한 헬퍼 컴포넌트
      const FallbackText = ({ text, alignClass = 'justify-center items-center text-center px-4' }) => {
        if (!checkHasText(text) || checkIsUrl(text)) return null;
        return (
          <div className={`absolute inset-0 flex flex-col sm:flex-row gap-2 ${alignClass} text-white font-black select-none drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] z-20`}>
            <div className="flex items-center text-white/90 shrink-0 bg-black/20 px-2 py-1 rounded-lg backdrop-blur-sm">
              <ImageIcon size={22} className="mr-1.5 opacity-90" />
              <span className="text-sm font-bold tracking-tight">요청 이미지</span>
            </div>
            <span className="text-xl sm:text-2xl truncate leading-tight">{text}</span>
          </div>
        );
      };

      return (
        <div className="p-6 flex flex-col xl:flex-row gap-6 min-h-[calc(100vh-80px)] animate-in fade-in duration-300">
          
          {/* ========================================================= */}
          {/* 1. 입력 폼 영역 (Left Column) */}
          {/* ========================================================= */}
          <div className="w-full xl:w-[400px] flex-shrink-0 space-y-6">
            <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 space-y-5 shadow-2xl">
              <div className="flex justify-between items-center border-b border-[#262833] pb-4 mb-2">
                <h3 className="text-base font-extrabold text-white flex items-center gap-2">
                  <span className="p-1.5 bg-[#7387ff]/20 text-[#7387ff] rounded-lg">
                    {block.type === 'TODAY_BTV' ? <MonitorPlay size={16}/> : block.type === 'BIG_BANNER' ? <Monitor size={16}/> : block.type === 'STRIP_BANNER' ? <RectangleHorizontal size={16}/> : <LayoutPanelLeft size={16}/>}
                  </span>
                  {block.name} 기획
                </h3>
              </div>
              
              <div className="space-y-4">
                {block.type !== 'TODAY_BTV' && (
                  <div>
                    <label className="block text-xs font-bold text-[#7387ff] mb-1.5 flex items-center gap-1"><Grid size={12}/> 편성 메뉴 (GNB)</label>
                    <input type="text" value={block.data?.gnb || ''} onChange={e => onUpdate(block.id, 'gnb', e.target.value)} placeholder="예: 영화 > 신작" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" />
                  </div>
                )}

                {block.type === 'TODAY_BTV' && (
                  <>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">상단 텍스트</label><input type="text" value={block.data?.topText || ''} onChange={e => onUpdate(block.id, 'topText', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">메인 타이틀 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label><textarea value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} rows={2} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none resize-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">서브 텍스트 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label><textarea value={block.data?.subText || ''} onChange={e => onUpdate(block.id, 'subText', e.target.value)} rows={3} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none resize-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">우상단 배경 이미지 URL</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                  </>
                )}

                {block.type === 'BIG_BANNER' && (
                  <>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">메인 문구</label><input type="text" value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div className="flex gap-2">
                      <div className="flex-1"><label className="block text-[10px] font-bold text-orange-400 mb-1.5">서브 타이틀 (강조)</label><input type="text" value={block.data?.subTitle || ''} onChange={e => onUpdate(block.id, 'subTitle', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                      <div className="flex-1"><label className="block text-[10px] font-bold text-slate-400 mb-1.5">상세 설명글</label><input type="text" value={block.data?.desc || ''} onChange={e => onUpdate(block.id, 'desc', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    </div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5 mt-2">우측 이미지 URL</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div className="flex gap-2">
                      <div className="w-[100px]"><label className="block text-xs font-bold text-slate-400 mb-1.5">버튼명</label><input type="text" value={block.data?.buttonText || ''} onChange={e => onUpdate(block.id, 'buttonText', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                      <div className="flex-1"><label className="block text-xs font-bold text-slate-400 mb-1.5">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    </div>
                  </>
                )}

                {block.type === 'GENERAL_BANNER' && (
                  <>
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1.5">배너 단수 (크기)</label>
                      <select value={block.data?.colType || '2단'} onChange={e => onUpdate(block.id, 'colType', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-sm text-white outline-none">
                        <option value="1단">1단 배너 (세로형)</option>
                        <option value="2단">2단 배너 (기본 가로형)</option>
                        <option value="3단">3단 배너 (와이드형)</option>
                      </select>
                    </div>

                    <div className="bg-[#1a1c26] p-4 rounded-xl border border-[#303340] space-y-3">
                      <div className="text-xs font-bold text-pink-400 mb-2 flex items-center gap-1.5"><MonitorPlay size={14}/> 1. 배경 프리뷰 영역 (TV 전체)</div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1 flex justify-between">배경 좌상단 텍스트 (1줄) <Type size={10}/></label><input type="text" value={block.data?.previewTitle || ''} onChange={e => onUpdate(block.id, 'previewTitle', e.target.value)} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white outline-none" placeholder="메인 타이틀 입력" /></div>
                      {/* 3번 요청 반영: 서브글 폼 업데이트 */}
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1 flex justify-between">배경 좌상단 서브글 (2~3줄) <Type size={10}/></label><textarea value={block.data?.previewSub || ''} onChange={e => onUpdate(block.id, 'previewSub', e.target.value)} rows={3} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white outline-none resize-none" placeholder="서브 설명글 영역&#10;2줄에서 3줄 정도 작성 요망&#10;예시입니다" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1 flex justify-between">배경 우상단 이미지 <ImageIcon size={10}/></label><input type="text" value={block.data?.previewImg || ''} onChange={e => onUpdate(block.id, 'previewImg', e.target.value)} placeholder="이미지 URL 또는 대체 단어" className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2 text-xs text-white outline-none" /></div>
                    </div>

                    <div className="bg-[#1a1c26] p-4 rounded-xl border border-[#303340] space-y-3 mt-4">
                      <div className="text-xs font-bold text-[#7387ff] mb-2 flex items-center gap-1.5"><LayoutPanelLeft size={14}/> 2. 배너 카드 영역 (하단 썸네일)</div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1 flex justify-between">배너 내 텍스트 (생략 가능) <Type size={10}/></label><textarea value={block.data?.bannerCopy || ''} onChange={e => onUpdate(block.id, 'bannerCopy', e.target.value)} rows={2} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2 text-xs text-white outline-none resize-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1 flex justify-between">배너 내 이미지 <ImageIcon size={10}/></label><input type="text" value={block.data?.bannerImg || ''} onChange={e => onUpdate(block.id, 'bannerImg', e.target.value)} placeholder="이미지 URL 또는 대체 단어" className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2 text-xs text-white outline-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2 text-xs text-white outline-none" /></div>
                    </div>
                  </>
                )}

                {block.type === 'LONG_BANNER' && (
                  <>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">배너 주요 카피</label><textarea value={block.data?.copy || ''} onChange={e => onUpdate(block.id, 'copy', e.target.value)} rows={4} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none resize-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5 mt-2">배경 이미지 URL</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5 mt-2">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                  </>
                )}

                {block.type === 'STRIP_BANNER' && (
                  <>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">메인 문구</label><input type="text" value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">서브 문구</label><input type="text" value={block.data?.subTitle || ''} onChange={e => onUpdate(block.id, 'subTitle', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5 mt-2">우측 이미지 URL</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5 mt-2">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none" /></div>
                  </>
                )}

                <div className="pt-4 mt-2 border-t border-[#262833]">
                  <label className="block text-xs font-bold text-slate-400 mb-1.5 flex items-center gap-1.5"><FileText size={12}/> 비고 (선택 사항)</label>
                  <textarea value={block.data?.note || ''} onChange={e => onUpdate(block.id, 'note', e.target.value)} rows={2} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white outline-none resize-none" placeholder="추가 전달 사항이나 메모를 입력하세요." />
                </div>
              </div>
            </div>

            {['TODAY_BTV', 'GENERAL_BANNER'].includes(block.type) && (
              <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-5 shadow-xl flex justify-between items-center cursor-pointer hover:bg-[#1a1c26] transition-colors" onClick={() => setLocalShowSafeZone(!localShowSafeZone)}>
                <span className="text-sm font-bold text-slate-300 flex items-center gap-2"><Grid size={16} className="text-[#7387ff]"/> TV 화면 가이드라인</span>
                <div className={`w-10 h-5 rounded-full relative transition-colors ${localShowSafeZone ? 'bg-[#7387ff]' : 'bg-slate-700'}`}>
                  <div className={`w-3.5 h-3.5 rounded-full bg-white absolute top-0.5 transition-transform ${localShowSafeZone ? 'left-[22px]' : 'left-[3px]'}`}></div>
                </div>
              </div>
            )}
          </div>

          {/* ========================================================= */}
          {/* 2. 시뮬레이터 프리뷰 영역 (Right Column) */}
          {/* ========================================================= */}
          <div className="flex-1 flex flex-col items-center justify-start pt-24 pb-8 px-8 bg-[#06070a] border border-[#1a1c26] rounded-2xl overflow-y-auto relative shadow-inner min-w-[700px] custom-scrollbar">
            
            <div className="absolute top-0 left-1/2 -translate-x-1/2 mt-6 flex items-center gap-2 text-[#7387ff] bg-[#7387ff]/10 px-4 py-1.5 rounded-full border border-[#7387ff]/30 z-20 shadow-md">
              <Grid size={14}/>
              <span className="text-xs font-bold tracking-tight">편성 메뉴: {block.data?.gnb || '미지정'}</span>
            </div>

            {block.type === 'TODAY_BTV' ? (
              /* --- Today B tv Mockup --- */
              <div className="relative w-full aspect-[16/9] max-w-[1000px] bg-[#0a0a0f] rounded-[24px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.9)] border-[8px] border-[#1a1a1a] shrink-0 mt-8">
                <div className="absolute inset-0 bg-[#0a0a0f]"></div>
                
                <div className="absolute right-[0%] top-[0%] w-[75%] h-[90%] bg-no-repeat bg-contain bg-right-top transition-all duration-500 z-0" style={{ backgroundImage: checkIsUrl(block.data?.imageUrl) ? `url(${block.data.imageUrl})` : 'none' }}>
                  {!checkIsUrl(block.data?.imageUrl) && !checkHasText(block.data?.imageUrl) && <div className="absolute inset-0 bg-gradient-to-bl from-[#1e1b4b] to-[#0a0a0f] opacity-50"></div>}
                  <FallbackText text={block.data?.imageUrl} alignClass="justify-end items-start pt-10 pr-10" />
                </div>

                <div className="absolute inset-0 w-[65%] bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/95 to-transparent z-10 pointer-events-none"></div>
                <div className="absolute inset-0 top-[50%] bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent z-10 pointer-events-none"></div>
                
                <div className="absolute inset-0 z-20 flex flex-col pointer-events-none text-white px-10">
                  <div className="absolute left-[80px] top-[40%] -translate-y-1/4 w-[45%] pl-2">
                    <h3 className="text-[#32d782] text-sm font-bold mb-2 tracking-tight">{block.data?.topText || '상단 카피'}</h3>

                    <div className="space-y-4">
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">프로젝트명</label><input type="text" name="campaignName" value={campaignMeta.campaignName} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">타겟 대상</label><input type="text" name="target" value={campaignMeta.target} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">톤앤매너</label><input type="text" name="toneAndManner" value={campaignMeta.toneAndManner} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                    </div>
                  </div>

                  <div>
                    <h2 className="text-[11px] font-bold text-[#7387ff] uppercase mb-4 flex items-center gap-1.5"><Calendar size={14}/> 릴리스 및 배포 정보</h2>
                    <div className="space-y-4">
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">상위 에픽 링크</label><input type="text" name="epicLink" value={campaignMeta.epicLink} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">Fix Version (배포일정)</label><input type="text" name="fixVersion" value={campaignMeta.fixVersion} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                      <div className="grid grid-cols-2 gap-3 bg-[#0a0812] p-3 rounded-xl border border-[#262833]">
                        <div><label className="block text-[10px] text-slate-500 mb-1">시작일</label><input type="date" name="startDate" value={campaignMeta.startDate} onChange={handleMetaChange} className="w-full bg-transparent text-xs text-white outline-none [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert" /></div>
                        <div><label className="block text-[10px] text-slate-500 mb-1">종료일</label><input type="date" name="dueDate" value={campaignMeta.dueDate} onChange={handleMetaChange} className="w-full bg-transparent text-xs text-white outline-none [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert" /></div>
                      </div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5">담당자 지정</label><input type="text" name="assignee" value={campaignMeta.assignee} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all" /></div>
                    </div>
                  </div>
                </div>
              </aside>

              <main className="flex-1 flex flex-col min-w-0 bg-[#06070a] relative">
                <header className="bg-[#12141c]/90 backdrop-blur z-20 sticky top-0 flex flex-col shadow-sm border-b border-[#262833]">
                  <div className="flex justify-between items-end px-6 pt-3">
                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar">
                      <div onClick={() => setActiveTabId('OVERVIEW')} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === 'OVERVIEW' ? 'bg-[#1e202c] text-[#7387ff] border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-white'}`}><ListTodo size={16}/><span>전체 관리 목록</span></div>
                      {assets.map(asset => (
                        <div key={asset.id} onClick={() => setActiveTabId(asset.id)} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === asset.id ? 'bg-[#1e202c] text-white border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-white'}`}>
                          <span className={activeTabId === asset.id ? 'text-[#7387ff]' : 'text-slate-500'}>{getAssetIcon(asset.type)}</span><span className="truncate max-w-[120px] ml-1">{asset.name}</span>
                          <button onClick={(e) => removeAsset(asset.id, e)} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-all ml-1"><Trash2 size={12}/></button>
                        </div>
                      ))}
                    </div>
                    <div className="pb-3 ml-4 flex gap-2 shrink-0">
                      <button onClick={() => setIsAddAssetModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-[#1a1c26] text-white rounded-xl text-xs font-bold border border-[#303340] hover:bg-[#262833] transition-colors"><Plus size={14} className="text-[#7387ff]"/> 슬롯 추가</button>
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                  {activeTabId === 'OVERVIEW' ? (
                    <div className="p-8 max-w-5xl mx-auto animate-in fade-in duration-300">
                      <div className="bg-[#12141c] border border-[#262833] rounded-2xl overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center"><div><h3 className="text-base font-bold text-white flex items-center gap-2"><ListTodo size={18} className="text-[#7387ff]" /> 일감 생성 리스트 ({assets.length}건)</h3></div></div>
                        <table className="w-full text-left border-collapse table-fixed">
                          <thead>
                            <tr className="bg-[#0a0812] text-xs text-slate-400 border-b border-[#262833]">
                              <th className="p-4 font-bold w-[25%]">배너 구분</th>
                              <th className="p-4 font-bold w-[20%]">상세 유형</th>
                              <th className="p-4 font-bold w-[45%]">티켓 제목 (미리보기)</th>
                              <th className="p-4 font-bold text-center w-[10%]">상태</th>
                            </tr>
                          </thead>
                          <tbody className="text-sm text-slate-200">
                            {assets.map((asset, idx) => (
                              <tr key={idx} className="border-b border-[#262833] hover:bg-[#1a1c26] cursor-pointer group transition-colors" onClick={() => setActiveTabId(asset.id)}>
                                <td className="p-5 font-medium text-slate-300 flex items-center gap-3 whitespace-nowrap overflow-hidden text-ellipsis">
                                  <div className="p-2 bg-[#262833] rounded-lg text-slate-400 group-hover:text-[#7387ff] transition-colors shrink-0">{getAssetIcon(asset.type)}</div>
                                  <span className="truncate">{asset.name}</span>
                                </td>
                                <td className="p-5 font-medium text-slate-400 whitespace-nowrap overflow-hidden text-ellipsis">
                                  {asset.type === 'GENERAL_BANNER' ? `${asset.data.colType} 배너` : asset.type === 'BIG_BANNER' ? '빅배너' : asset.type === 'STRIP_BANNER' ? '띠배너' : asset.type === 'LONG_BANNER' ? '롱배너' : 'Today B tv'}
                                </td>
                                <td className="p-5 font-bold text-[#7387ff] whitespace-nowrap overflow-hidden text-ellipsis">
                                  [디자인] {campaignMeta.campaignName} - {asset.name}
                                </td>
                                <td className="p-5 text-center whitespace-nowrap">
                                  <span className="text-[10px] font-bold bg-slate-800 border border-slate-700 text-slate-400 px-3 py-1.5 rounded-full uppercase tracking-wider">Ready</span>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  ) : (
                    <BlockRenderer block={activeAsset} onUpdate={handleAssetChange} />
                  )}
                </div>
              </main>
            </>
          )}

          {isAddAssetModalOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in zoom-in-95 duration-200">
              <div className="bg-[#12141c] w-[900px] border border-[#262833] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]">
                  <h3 className="text-xl font-black text-white flex items-center gap-2"><PlusCircle size={22} className="text-[#7387ff]"/> 매체 규격 추가</h3>
                  <button onClick={() => setIsAddAssetModalOpen(false)} className="p-1.5 hover:bg-slate-800 rounded-full text-slate-400 hover:text-white transition-colors"><X size={20}/></button>
                </div>
                <div className="p-8 grid grid-cols-2 lg:grid-cols-3 gap-5 max-h-[70vh] overflow-y-auto custom-scrollbar bg-[#0a0812]">
                  {BANNER_SPECS.map((spec) => (
                    <div key={spec.type} onClick={() => addAsset(spec.type, spec.name)} className="bg-[#1a1c26] border border-[#303340] rounded-2xl p-6 cursor-pointer hover:border-[#7387ff] hover:-translate-y-1 transition-all flex flex-col h-full group shadow-md">
                      <div className="flex items-start justify-between mb-4"><div className="p-3 bg-[#262833] rounded-xl text-[#7387ff] group-hover:bg-[#7387ff] group-hover:text-white transition-colors"><spec.icon size={24} /></div><span className="text-[10px] font-bold bg-[#0a0812] border border-[#303340] text-slate-400 px-2 py-1 rounded-md">{spec.ratio}</span></div>
                      <h4 className="text-lg font-bold text-white mb-1 group-hover:text-[#7387ff] transition-colors">{spec.name}</h4>
                      <p className="text-xs text-slate-500 leading-relaxed mt-auto pt-4 border-t border-[#262833]">{spec.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-in fade-in">
              <div className="bg-[#12141c] w-[650px] border border-[#262833] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]"><h3 className="text-base font-bold text-white flex items-center gap-2"><Send size={20} className="text-[#4f3df6]" /> Jira 일감 전송 워크플로우</h3><button onClick={() => setModalState({ isOpen: false })}><X size={18}/></button></div>
                <div className="p-10 flex flex-col gap-8">
                  <div className="flex gap-5 items-start"><div className="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center shrink-0 border border-blue-500/20"><CheckCircle size={24}/></div><div><h4 className="text-white font-bold mb-1">1단계: 데이터 패킹 완료</h4><p className="text-sm text-slate-500 leading-relaxed">총 <strong className="text-white">{modalState.payloads.length}건</strong>의 기획 데이터가 준비되었습니다.</p></div></div>
                  <div className="flex gap-5 items-start"><div className="w-10 h-10 rounded-full bg-[#262833] text-slate-300 flex items-center justify-center shrink-0 border border-[#303340] font-black">2</div><div className="w-full"><h4 className="text-white font-bold mb-1">2단계: 지라(Jira) 확장 매크로 실행</h4><p className="text-sm text-slate-500 mb-4 tracking-tight">BTVEVT 프로젝트 화면에서 'B tv Campaign 매크로'를 실행하세요.</p><div className="bg-[#06070a] border border-[#262833] rounded-2xl p-4 flex items-center justify-between"><span className="text-[11px] text-slate-500 font-mono italic">Ready to Transfer: {modalState.payloads.length} items</span><button onClick={copyToClipboard} className="text-xs text-[#7387ff] font-bold border border-[#7387ff]/30 px-3 py-1.5 rounded-lg hover:bg-[#7387ff] hover:text-white transition-all"><Copy size={14} className="inline mr-1"/> 마크다운 복사</button></div></div></div>
                </div>
                <div className="p-6 bg-[#0f111a] border-t border-[#262833] flex justify-end"><button onClick={() => setModalState({ isOpen: false })} className="px-8 py-2.5 bg-[#262833] text-white text-sm font-bold rounded-xl transition-all hover:bg-[#32343d]">닫기</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
