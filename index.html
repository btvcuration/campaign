<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; font-family: 'Pretendard', -apple-system, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Smile, Settings, Calendar, GitMerge, Plus, Trash2, Image as ImageIcon,
      ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, ArrowRight, X, Target, Edit3, User, ExternalLink
    } from 'lucide-react';

    // --- Specifications & Templates ---
    const BANNER_SPECS = [
      { type: 'TODAY_BTV', name: 'Today B tv', icon: MonitorPlay, ratio: '16:9', size: '3840 x 2160', max: 'Max 4MB', desc: '홈 최상단 대형 배너. 75% 이미지 배치 가이드 준수.' },
      { type: 'BANNER_3_COL', name: '3단 배너', icon: LayoutPanelLeft, ratio: '3:1', size: '2880 x 960', max: 'Max 3MB', desc: '와이드 3칸 배너. 이미지형 위주 기획.' },
      { type: 'BANNER_2_COL', name: '2단 배너', icon: ImageIcon, ratio: '16:9', size: '1920 x 1080', max: 'Max 2MB', desc: '가장 보편적인 2칸 배너.' },
      { type: 'BANNER_1_COL', name: '1단 배너', icon: LayoutPanelLeft, ratio: '3:4', size: '1080 x 1440', max: 'Max 2MB', desc: '포스터형 1칸 배너.' },
      { type: 'LONG_BANNER', name: '롱배너', icon: Smartphone, ratio: '1:2', size: '800 x 1600', max: 'Max 3MB', desc: '세로형 긴 배너.' },
      { type: 'BAND_BANNER', name: '띠배너', icon: ImageIcon, ratio: '8:1', size: '3840 x 480', max: 'Max 2MB', desc: '블록 사이 슬림 배너.' },
    ];

    const DEFAULT_TODAY_BTV = {
      topText: '상단 카피',
      mainTitle: '메인 문구',
      subText: '서브 텍스트',
      landingValue: '가입 유도 랜딩',
      buttonText: '자세히 보기',
      imageUrl: '',
      gnb: '홈 최상단',
    };

    const DEFAULT_BANNER = {
      copy: '메인 문구',
      landingValue: '가입 유도 랜딩 (UI_PATH: /join)',
      buttonText: '', 
      imageUrl: '',
      gnb: '영화',
    };

    // --- BlockRenderer (프리뷰 개선 버전) ---
    const BlockRenderer = ({ block, onUpdate, onRemove, readOnly = false }) => {
      const [localShowSafeZone, setLocalShowSafeZone] = useState(true);
      
      const isActualUrl = Boolean(block?.data?.imageUrl && typeof block.data.imageUrl === 'string' && block.data.imageUrl.startsWith('http'));
      const hasImageText = Boolean(block?.data?.imageUrl && !isActualUrl && block.data.imageUrl.trim() !== '');

      const getPreviewClasses = (type) => {
        switch(type) {
          case 'BANNER_1_COL': return 'aspect-[3/4] w-[300px] max-w-full'; 
          case 'BANNER_2_COL': return 'aspect-[16/9] w-[500px] max-w-full'; 
          case 'BANNER_3_COL': return 'aspect-[3/1] w-[850px] max-w-full'; 
          case 'LONG_BANNER': return 'aspect-[1/2] w-[240px] max-w-full'; 
          case 'BAND_BANNER': return 'aspect-[8/1] w-[850px] max-w-full'; 
          default: return 'aspect-[16/9] w-[500px] max-w-full';
        }
      };

      return (
        <div className="p-6 flex flex-col xl:flex-row gap-6 min-h-[calc(100vh-80px)] animate-in fade-in duration-300">
          {/* Form Column */}
          <div className="w-full xl:w-[380px] flex-shrink-0 space-y-6">
            <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 space-y-5 shadow-2xl">
              <div className="flex justify-between items-center border-b border-[#262833] pb-4 mb-2">
                <h3 className="text-base font-extrabold text-white flex items-center gap-2">
                  <span className="p-1.5 bg-[#7387ff]/20 text-[#7387ff] rounded-lg">
                    {block.type === 'TODAY_BTV' ? <MonitorPlay size={16}/> : block.type === 'LONG_BANNER' ? <Smartphone size={16}/> : <ImageIcon size={16}/>}
                  </span>
                  {block.name} 기획
                </h3>
              </div>
              
              <div className="space-y-4">
                {block.type !== 'TODAY_BTV' && (
                  <div>
                    <label className="block text-xs font-bold text-[#7387ff] mb-1.5 flex items-center gap-1"><Grid size={12}/> 편성 메뉴 (GNB)</label>
                    <input type="text" value={block.data?.gnb || ''} onChange={e => onUpdate(block.id, 'gnb', e.target.value)} placeholder="예: 영화 > 신작" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" />
                  </div>
                )}

                {block.type === 'TODAY_BTV' ? (
                  <>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">상단 텍스트</label><input type="text" value={block.data?.topText || ''} onChange={e => onUpdate(block.id, 'topText', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">메인 문구</label><textarea value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} rows={2} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">서브 텍스트</label><textarea value={block.data?.subText || ''} onChange={e => onUpdate(block.id, 'subText', e.target.value)} rows={3} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                  </>
                ) : (
                  <div><label className="block text-xs font-bold text-slate-400 mb-1.5">배너 주요 카피</label><textarea value={block.data?.copy || ''} onChange={e => onUpdate(block.id, 'copy', e.target.value)} rows={4} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                )}
              </div>
              
              <div className="pt-2 border-t border-[#262833] space-y-4">
                <div><label className="block text-xs font-bold text-slate-400 mb-1.5">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} placeholder="UI_PATH 등 입력" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                {block.type === 'TODAY_BTV' ? (
                  <div><label className="block text-xs font-bold text-slate-400 mb-1.5 flex justify-between">버튼명 <span className="text-[10px] font-normal text-[#7387ff]">고정</span></label><input type="text" value="자세히 보기" disabled className="w-full bg-[#1a1c26]/50 border border-[#303340] rounded-lg p-2.5 text-sm text-slate-500 cursor-not-allowed" /></div>
                ) : (
                  !['BANNER_1_COL', 'BANNER_2_COL', 'BANNER_3_COL'].includes(block.type) && (
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">버튼명</label><input type="text" value={block.data?.buttonText || ''} onChange={e => onUpdate(block.id, 'buttonText', e.target.value)} placeholder="예: 바로 보기" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                  )
                )}
                <div><label className="block text-xs font-bold text-slate-400 mb-1.5">배경 이미지 URL</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} placeholder="링크 또는 '아바타' 등 키워드" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
              </div>
            </div>
            {block.type === 'TODAY_BTV' && (<div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 shadow-xl"><button onClick={() => setLocalShowSafeZone(!localShowSafeZone)} className={`w-full py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm ${localShowSafeZone ? 'bg-[#7387ff] text-white' : 'bg-[#1a1c26] text-slate-400 border border-[#303340] hover:text-white'}`}><Grid size={18} /> TV 안전 영역 ON/OFF</button></div>)}
          </div>

          {/* Preview Column */}
          <div className="flex-1 flex flex-col items-center justify-center p-8 bg-[#06070a] border border-[#1a1c26] rounded-2xl overflow-hidden relative shadow-inner min-w-[600px]">
            {block.type === 'TODAY_BTV' ? (
              <div className="relative w-full aspect-[16/9] max-w-[1000px] bg-[#0a0a0f] rounded-[24px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.9)] border-[8px] border-[#1a1a1a]">
                <div className="absolute inset-0 bg-no-repeat bg-right-top transition-all duration-500" style={{ backgroundImage: isActualUrl ? `url(${block.data.imageUrl})` : 'none', backgroundSize: '75% 85%' }}>
                  {hasImageText && <div className="ml-[40%] text-white/20 text-[5rem] font-black italic">{block.data.imageUrl}</div>}
                  {!isActualUrl && !hasImageText && <div className="absolute inset-0 bg-gradient-to-bl from-[#1e1b4b] to-[#0a0a0f] opacity-50"></div>}
                </div>
                <div className="absolute inset-0 w-[65%] bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent z-10 pointer-events-none"></div>
                <div className="absolute inset-0 z-20 flex flex-col pointer-events-none text-white p-6">
                  <div className="absolute left-0 top-0 bottom-0 w-[80px] flex flex-col items-center pt-16 pb-8 gap-8 opacity-50 border-r border-white/5"><Menu size={22}/><Tv size={22}/><Home size={26}/><Grid size={22}/><Settings size={22} className="mt-auto"/></div>
                  <div className="absolute left-[100px] top-[42%] -translate-y-1/4 w-[38%] pl-2">
                    {block.data?.topText && <h3 className="text-[#32d782] text-base font-bold mb-2 drop-shadow-md tracking-tight">{block.data.topText}</h3>}
                    <h1 className="text-white text-[2rem] font-black mb-4 leading-[1.2] tracking-tight">{block.data?.mainTitle || '메인 문구'}</h1>
                    <p className="text-slate-200 text-sm font-medium mb-6 leading-[1.6]">{block.data?.subText || '서브 텍스트'}</p>
                    <div className="inline-flex bg-[#4631e6] text-white px-5 py-2 rounded-lg font-bold text-sm shadow-xl">자세히 보기</div>
                  </div>
                </div>
                {localShowSafeZone && (
                  <div className="absolute inset-0 z-30 pointer-events-none opacity-50">
                    <div className="absolute left-[50%] top-0 bottom-0 w-px border-l border-dashed border-white/50"></div>
                    <div className="absolute top-[45%] left-0 right-0 h-px border-t border-dashed border-white/50"></div>
                    <div className="absolute right-[4%] top-[15%] bottom-[28%] left-[53%] border border-[#00bcd4]/40 bg-[#00bcd4]/5 flex items-center justify-center"><span className="text-[#00bcd4] font-black text-2xl">이미지 안전 영역</span></div>
                  </div>
                )}
              </div>
            ) : (
              /* [중요] 일반 배너 (1, 2, 3단) 좌우 분할 프리뷰 */
              <div className="flex flex-col items-center justify-center w-full h-full relative">
                <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-full mb-4 flex items-center gap-2 text-[#7387ff] bg-[#7387ff]/10 px-3 py-1 rounded-full border border-[#7387ff]/30 text-[11px] font-bold">편성 위치: {block.data?.gnb || '미지정'}</div>
                <div className={`relative bg-[#12141c] rounded-2xl overflow-hidden shadow-2xl border border-[#303340] flex transition-all duration-300 ${getPreviewClasses(block.type)}`}>
                  {/* Left: Copy Area (45%) */}
                  <div className="w-[45%] h-full flex flex-col justify-center items-start p-8 text-left z-10">
                    <p className={`text-white font-extrabold whitespace-pre-wrap leading-[1.2] tracking-tighter ${block.type === 'BANNER_1_COL' ? 'text-xl' : block.type === 'BANNER_3_COL' ? 'text-[2.5rem]' : 'text-[1.85rem]'}`}>
                      {block.data?.copy || '기획 문구를\n입력하세요'}
                    </p>
                    {block.data?.buttonText && <span className="mt-4 inline-flex bg-[#4631e6] text-white px-3 py-1 rounded-md font-bold text-[10px]">{block.data.buttonText}</span>}
                  </div>
                  {/* Right: Image Area (55%) */}
                  <div className="w-[55%] h-full relative border-l border-white/5">
                    <div className="absolute inset-0 bg-no-repeat bg-cover bg-center" style={{ backgroundImage: isActualUrl ? `url(${block.data.imageUrl})` : 'none' }}>
                      {!isActualUrl && <div className="absolute inset-0 bg-gradient-to-br from-[#1e1b4b] to-[#0a0812]"></div>}
                      {hasImageText && <div className="absolute inset-0 flex items-center justify-center text-white/10 text-3xl font-black italic px-4 text-center select-none">{block.data.imageUrl}</div>}
                      <div className="absolute inset-0 bg-gradient-to-r from-[#12141c] via-transparent to-transparent opacity-80"></div>
                    </div>
                  </div>
                  {block.type === 'BAND_BANNER' && <div className="absolute bottom-2 right-4 text-[9px] font-bold text-white/30 bg-black/50 px-2 py-0.5 rounded">AD</div>}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    function App() {
      const [appView, setAppView] = useState('CAMPAIGN_MANAGER'); 
      const [campaignMeta, setCampaignMeta] = useState({ campaignName: '신규 프로모션', target: '전체', toneAndManner: '심플', assignee: '담당자', epicLink: 'BTVEVT-0000', fixVersion: '26년_04월', startDate: '2026-04-01', dueDate: '2026-04-30' });
      const [assets, setAssets] = useState([{ id: 'asset-1', type: 'TODAY_BTV', name: 'Today B tv', data: { ...DEFAULT_TODAY_BTV } }]);
      const [activeTabId, setActiveTabId] = useState('OVERVIEW');
      const [isAddAssetModalOpen, setIsAddAssetModalOpen] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, step: 0, payloads: [] });

      const handleMetaChange = (e) => setCampaignMeta({ ...campaignMeta, [e.target.name]: e.target.value });
      const handleAssetChange = (id, field, value) => setAssets(assets.map(asset => asset.id === id ? { ...asset, data: { ...asset.data, [field]: value } } : asset));

      const addAsset = (type, name) => {
        const newId = `asset-${Date.now()}`;
        setAssets([...assets, { id: newId, type, name, data: type === 'TODAY_BTV' ? { ...DEFAULT_TODAY_BTV } : { ...DEFAULT_BANNER } }]);
        setActiveTabId(newId);
        setIsAddAssetModalOpen(false);
      };

      const removeAsset = (id, e) => {
        e.stopPropagation();
        if (assets.length === 1) return alert('최소 1개의 제작물은 필요합니다.');
        setAssets(assets.filter(a => a.id !== id));
        if (activeTabId === id) setActiveTabId('OVERVIEW');
      };

      const handleExport = () => {
        const payloads = assets.map(asset => {
          const targetGnb = asset.type === 'TODAY_BTV' ? '홈 최상단' : (asset.data.gnb || '미지정');
          const description = `h3. 📌 캠페인 공통 정보\n| *캠페인명* | ${campaignMeta.campaignName} |\n| *편성 GNB* | ${targetGnb} |\n\n---\n\nh3. 🖼️ 상세 기획\n* ${asset.type === 'TODAY_BTV' ? `문구: ${asset.data.mainTitle}` : `카피: ${asset.data.copy}`}\n* 랜딩: ${asset.data.landingValue}`;
          return { action: "CREATE_JIRA_ISSUE", data: { issueTitle: `[디자인] ${campaignMeta.campaignName} - ${asset.name}`, description } };
        });
        setModalState({ isOpen: true, payloads });
      };

      return (
        <div className="flex h-screen w-full bg-[#0a0812] text-slate-200 overflow-hidden">
          {/* Global Nav */}
          <nav className="w-[72px] bg-[#0f111a] border-r border-[#262833] flex flex-col items-center py-6 z-30">
            {/* [수정] 메인 로고: 버튼 형태 제거 */}
            <div className="w-11 h-11 bg-gradient-to-br from-[#7387ff] to-[#4631e6] rounded-xl flex items-center justify-center mb-10 shadow-lg shadow-[#7387ff]/20">
              <Tv className="text-white" size={24} />
            </div>
            
            <div className="flex flex-col gap-5 w-full px-3">
              {/* [복구] AI 메뉴 아이콘 */}
              <button onClick={() => setAppView('AI_COPILOT')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'AI_COPILOT' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white'}`} title="AI 코파일럿">
                <Bot size={26} />
              </button>
              <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'CAMPAIGN_MANAGER' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white'}`} title="캠페인 매니저">
                <LayoutTemplate size={26} />
              </button>
            </div>
          </nav>

          {appView === 'AI_COPILOT' ? (
            <div className="flex-1 flex flex-col items-center justify-center bg-[#0a0812] animate-in fade-in">
              <Sparkles size={48} className="text-[#7387ff] mb-4 opacity-50" />
              <h2 className="text-2xl font-bold text-slate-400">AI 프로모션 제안 기능 준비 중</h2>
              <p className="text-slate-600 mt-2 text-sm">목적을 입력하면 배너 조합을 자동 구성하는 엔진이 개발 중입니다.</p>
              <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className="mt-8 px-6 py-2 bg-[#7387ff] text-white rounded-lg font-bold">캠페인 매니저로 가기</button>
            </div>
          ) : (
            <>
              <aside className="w-[340px] bg-[#12141c] border-r border-[#262833] flex flex-col h-full z-10 animate-in slide-in-from-left-4">
                <div className="p-6 border-b border-[#262833] bg-[#0f111a]"><h1 className="text-xl font-black text-white">B tv Campaign</h1><p className="text-[10px] text-slate-500 mt-1 uppercase tracking-widest font-bold">Promotion Orchestrator</p></div>
                <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                  <button onClick={handleExport} className="w-full bg-gradient-to-r from-[#4f3df6] to-[#7387ff] text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-lg hover:brightness-110 transition-all">
                    <Send size={16} /> Jira 다중 일감 전송 <span className="bg-white/20 px-2 py-0.5 rounded-md text-xs">{assets.length}</span>
                  </button>
                  <div className="space-y-4">
                    <h2 className="text-[11px] font-bold text-slate-500 uppercase flex items-center gap-2"><LayoutTemplate size={12}/> 캠페인 기본 정보</h2>
                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">캠페인명</label><input type="text" name="campaignName" value={campaignMeta.campaignName} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                    <div className="grid grid-cols-2 gap-3 bg-[#0a0812] p-3 rounded-xl border border-[#262833]">
                      <div><label className="block text-[10px] text-slate-500 mb-1">시작일</label><input type="date" name="startDate" value={campaignMeta.startDate} onChange={handleMetaChange} className="w-full bg-transparent text-xs text-white outline-none" /></div>
                      <div><label className="block text-[10px] text-slate-500 mb-1">종료일</label><input type="date" name="dueDate" value={campaignMeta.dueDate} onChange={handleMetaChange} className="w-full bg-transparent text-xs text-white outline-none" /></div>
                    </div>
                  </div>
                </div>
              </aside>

              <main className="flex-1 flex flex-col min-w-0 bg-[#06070a] relative">
                <header className="bg-[#12141c]/90 backdrop-blur z-20 sticky top-0 flex flex-col shadow-sm border-b border-[#262833]">
                  <div className="flex justify-between items-end px-6 pt-4">
                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar">
                      <div onClick={() => setActiveTabId('OVERVIEW')} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === 'OVERVIEW' ? 'bg-[#1e202c] text-[#7387ff] border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-white'}`}><ListTodo size={16}/><span>관리 목록</span></div>
                      {assets.map(asset => (
                        <div key={asset.id} onClick={() => setActiveTabId(asset.id)} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === asset.id ? 'bg-[#1e202c] text-white border-[#7387ff]' : 'text-slate-400 border-transparent'}`}>
                          <span className={activeTabId === asset.id ? 'text-[#7387ff]' : 'text-slate-500'}>{getAssetIcon(asset.type)}</span><span className="truncate max-w-[80px]">{asset.name}</span>
                          <button onClick={(e) => removeAsset(asset.id, e)} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-all"><Trash2 size={12}/></button>
                        </div>
                      ))}
                    </div>
                    <div className="pb-3 ml-4"><button onClick={() => setIsAddAssetModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-[#1a1c26] text-white rounded-xl text-xs font-bold border border-[#303340] hover:bg-[#262833] transition-colors"><Plus size={16} className="text-[#7387ff]"/> 슬롯 추가</button></div>
                  </div>
                </header>
                <div className="flex-1 overflow-y-auto custom-scrollbar">
                  {activeTabId === 'OVERVIEW' ? (
                    <div className="p-8 max-w-5xl mx-auto"><div className="bg-[#12141c] border border-[#262833] rounded-2xl overflow-hidden shadow-2xl"><div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center"><div><h3 className="text-base font-bold text-white flex items-center gap-2"><ListTodo size={18} className="text-[#7387ff]" /> 일감 생성 리스트</h3></div></div><table className="w-full text-left border-collapse"><tbody className="text-sm text-slate-200">{assets.map((asset, idx) => (<tr key={idx} className="border-b border-[#262833] hover:bg-[#1a1c26] cursor-pointer group" onClick={() => setActiveTabId(asset.id)}><td className="p-5 font-medium text-slate-300 flex items-center gap-3"><div className="p-2 bg-[#262833] rounded-lg text-slate-400 group-hover:text-[#7387ff]">{getAssetIcon(asset.type)}</div>{asset.name}</td><td className="p-5 font-bold text-[#7387ff] truncate">[디자인] {campaignMeta.campaignName} - {asset.name}</td><td className="p-5 text-center"><span className="text-[10px] font-bold bg-[#1a1c26] border border-[#303340] text-slate-500 px-3 py-1.5 rounded-full uppercase">Waiting</span></td></tr>))}</tbody></table></div></div>
                  ) : (
                    <BlockRenderer block={activeAsset} onUpdate={handleAssetChange} />
                  )}
                </div>
              </main>
            </>
          )}

          {/* Add Asset Modal */}
          {isAddAssetModalOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in zoom-in-95">
              <div className="bg-[#12141c] w-[900px] border border-[#262833] rounded-2xl shadow-2xl flex flex-col"><div className="p-6 border-b border-[#262833] flex justify-between items-center"><div><h3 className="text-xl font-bold text-white">매체 규격 선택</h3></div><button onClick={() => setIsAddAssetModalOpen(false)}><X size={20}/></button></div><div className="p-8 grid grid-cols-2 lg:grid-cols-3 gap-5 max-h-[70vh] overflow-y-auto">{BANNER_SPECS.map((spec) => (<div key={spec.type} onClick={() => addAsset(spec.type, spec.name)} className="bg-[#1a1c26] border border-[#303340] rounded-xl p-5 cursor-pointer hover:border-[#7387ff] transition-all flex flex-col h-full"><div className="flex items-start justify-between mb-4"><div className="p-3 bg-[#262833] rounded-xl text-[#7387ff]"><spec.icon size={24} /></div><span className="text-[10px] font-bold bg-slate-800 text-slate-300 px-2 py-1 rounded-md">{spec.ratio}</span></div><h4 className="text-lg font-bold text-white mb-2">{spec.name}</h4><div className="text-[11px] text-slate-500 font-mono mb-4">{spec.size}</div><p className="text-xs text-slate-400 leading-relaxed mt-auto pt-4 border-t border-[#262833]">{spec.desc}</p></div>))}</div></div>
            </div>
          )}

          {/* Jira Guide Modal */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in">
              <div className="bg-[#12141c] w-[650px] border border-[#262833] rounded-2xl shadow-2xl flex flex-col"><div className="p-5 border-b border-[#262833] flex justify-between items-center"><h3 className="text-base font-bold text-white flex items-center gap-2"><Send size={20} className="text-[#4f3df6]" /> Jira 전송 대기 중</h3><button onClick={() => setModalState({ isOpen: false })}><X size={18}/></button></div><div className="p-8"><div className="mb-8 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl flex items-center gap-3"><CheckCircle size={20} className="text-blue-400"/><p className="text-xs text-slate-300">총 <strong className="text-white">{modalState.payloads.length}건</strong>의 기획 데이터 패킹 완료. 확장을 실행해 주세요.</p></div><div className="space-y-6 relative"><div className="flex gap-4 items-start"><div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-xs font-bold border border-[#303340]">2</div><div><h4 className="text-sm font-bold text-white mb-1">Jira BTVEVT 열기</h4><a href="#" target="_blank" className="inline-flex items-center gap-1.5 text-[11px] bg-[#1a1c26] text-white px-3 py-1.5 rounded-lg border border-[#303340] mt-1"><ExternalLink size={12} className="text-[#7387ff]"/> 프로젝트 보드 바로가기</a></div></div><div className="flex gap-4 items-start"><div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-xs font-bold border border-[#303340]">3</div><div className="w-full"><h4 className="text-sm font-bold text-white mb-1">B tv 매크로 실행</h4><p className="text-xs text-slate-400">지라 페이지에서 확장 프로그램을 클릭하면 티켓이 순차 생성됩니다.</p><div className="bg-[#06070a] border border-[#262833] rounded-lg p-3 mt-3 flex items-center justify-between"><span className="text-[10px] text-slate-600 font-mono">Payloads: {modalState.payloads.length}</span><button onClick={copyToClipboard} className="text-[10px] text-[#7387ff] font-bold uppercase tracking-wider hover:text-white transition-all"><Copy size={12} className="inline mr-1"/> Copy Markdown</button></div></div></div></div></div><div className="p-5 bg-[#0f111a] border-t border-[#262833] flex justify-end"><button onClick={() => setModalState({ isOpen: false })} className="px-8 py-2 bg-[#262833] text-white text-xs font-bold rounded-lg transition-colors">닫기</button></div></div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
