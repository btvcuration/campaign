<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; font-family: 'Pretendard', -apple-system, sans-serif; color: #cbd5e1; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    
    // [중요] 블랙아웃의 원인이었던 아이콘 Import 누락 완벽 해결
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, ChevronDown, ChevronLeft, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Settings, Calendar, GitMerge, Plus, PlusCircle, Trash2, 
      Image as ImageIcon, ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, 
      X, User, ExternalLink, Monitor, Layout
    } from 'lucide-react';

    // --- Specifications & Templates ---
    const BANNER_SPECS = [
      { type: 'TODAY_BTV', name: 'Today B tv', icon: MonitorPlay, ratio: '16:9', size: '3840 x 2160', max: 'Max 4MB', desc: '홈 화면 최상단 대형 배너.' },
      { type: 'BANNER_3_COL', name: '3단 배너', icon: LayoutPanelLeft, ratio: '196:89', size: '가변', max: 'Max 3MB', desc: '와이드 3칸 배너. 배경 프리뷰 + 배너 카드 세트.' },
      { type: 'BANNER_2_COL', name: '2단 배너', icon: ImageIcon, ratio: '129:89', size: '가변', max: 'Max 2MB', desc: '가장 보편적인 2칸 배너. 배경 프리뷰 + 배너 카드 세트.' },
      { type: 'BANNER_1_COL', name: '1단 배너', icon: Smartphone, ratio: '62:89', size: '가변', max: 'Max 2MB', desc: '포스터형 1칸 세로 배너. 배경 프리뷰 + 배너 카드 세트.' },
    ];

    const DEFAULT_TODAY_BTV = {
      topText: '디즈니+ 런칭', mainTitle: '원작의 느낌 그대로.\n리메이크 콘텐츠 특집', subText: '지금 가입하고 감상하세요',
      landingValue: 'UI_PATH: /join', buttonText: '자세히 보기', imageUrl: '', gnb: '홈 최상단'
    };

    const DEFAULT_BANNER = {
      previewTitle: '프리뷰 상단 문구\n일이삼사오육칠팔', previewSub: '프리뷰 하단 서브 텍스트', previewImg: '', 
      copy: '배너 내부 텍스트', imageUrl: '', landingValue: 'UI_PATH: /join', gnb: '영화 > 신작'
    };

    // --- Mock Data ---
    const INITIAL_GNB_TREE = [
        { id: '1', name: '홈', slug: 'home', children: [] },
        { 
            id: '2', name: '영화', slug: 'movie', children: [
                { id: '2-1', name: '추천 영화', slug: 'rec-movie' },
                { id: '2-2', name: '신작', slug: 'new-movie' },
            ] 
        }
    ];

    // --- BlockRenderer (프리뷰 코어: 폼과 캔버스 분리 완벽 구현) ---
    const BlockRenderer = ({ block, onUpdate, readOnly = false }) => {
      if (!block) return null; // 렌더링 에러 방지 안전망
      const [localShowSafeZone, setLocalShowSafeZone] = useState(true);

      const checkIsUrl = (str) => Boolean(str && typeof str === 'string' && str.startsWith('http'));
      const checkHasText = (str) => Boolean(str && !checkIsUrl(str) && str.trim() !== '');

      const isBanner123 = ['BANNER_1_COL', 'BANNER_2_COL', 'BANNER_3_COL'].includes(block.type);

      return (
        <div className="p-6 flex flex-col xl:flex-row gap-6 min-h-[calc(100vh-80px)] animate-in fade-in duration-300">
          
          {/* ========================================================= */}
          {/* 1. 입력 폼 영역 (Left Column) */}
          {/* ========================================================= */}
          <div className="w-full xl:w-[400px] flex-shrink-0 space-y-6">
            <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 space-y-5 shadow-2xl">
              <div className="flex justify-between items-center border-b border-[#262833] pb-4 mb-2">
                <h3 className="text-base font-extrabold text-white flex items-center gap-2">
                  <span className="p-1.5 bg-[#7387ff]/20 text-[#7387ff] rounded-lg">
                    {block.type === 'TODAY_BTV' ? <MonitorPlay size={16}/> : <ImageIcon size={16}/>}
                  </span>
                  {block.name} 기획
                </h3>
              </div>
              
              <div className="space-y-4">
                {block.type !== 'TODAY_BTV' && (
                  <div>
                    <label className="block text-xs font-bold text-[#7387ff] mb-1.5 flex items-center gap-1"><Grid size={12}/> 편성 메뉴 (GNB)</label>
                    <input type="text" value={block.data?.gnb || ''} onChange={e => onUpdate(block.id, 'gnb', e.target.value)} placeholder="예: 영화 > 신작" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none transition-all shadow-sm" />
                  </div>
                )}

                {block.type === 'TODAY_BTV' ? (
                  <>
                    {/* Today B tv Form */}
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">상단 텍스트</label><input type="text" value={block.data?.topText || ''} onChange={e => onUpdate(block.id, 'topText', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">메인 타이틀 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label><textarea value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} rows={2} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                    <div><label className="block text-xs font-bold text-slate-400 mb-1.5">서브 텍스트 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label><textarea value={block.data?.subText || ''} onChange={e => onUpdate(block.id, 'subText', e.target.value)} rows={3} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                    <div className="pt-2 border-t border-[#262833] space-y-4">
                      <div><label className="block text-xs font-bold text-slate-400 mb-1.5">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                      <div><label className="block text-xs font-bold text-slate-400 mb-1.5 flex justify-between">버튼명 <span className="text-[10px] font-normal text-[#7387ff]">고정</span></label><input type="text" value="자세히 보기" disabled className="w-full bg-[#1a1c26]/50 border border-[#303340] rounded-lg p-2.5 text-sm text-slate-500 cursor-not-allowed" /></div>
                      <div><label className="block text-xs font-bold text-slate-400 mb-1.5">우상단 이미지 URL (또는 단어)</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                    </div>
                  </>
                ) : isBanner123 && (
                  <>
                    {/* 일반 배너 1, 2, 3단 Form (배경 프리뷰 vs 배너 카드 분리) */}
                    <div className="bg-[#1a1c26] p-4 rounded-xl border border-[#303340] space-y-3 shadow-inner">
                      <div className="text-xs font-bold text-pink-400 mb-2 flex items-center gap-1.5"><MonitorPlay size={14}/> 1. TV 배경 프리뷰 설정</div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">좌상단 메인 문구</label><textarea value={block.data?.previewTitle || ''} onChange={e => onUpdate(block.id, 'previewTitle', e.target.value)} rows={2} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-pink-500 outline-none resize-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">좌상단 서브 문구</label><textarea value={block.data?.previewSub || ''} onChange={e => onUpdate(block.id, 'previewSub', e.target.value)} rows={2} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-pink-500 outline-none resize-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">우상단 배경 이미지 URL</label><input type="text" value={block.data?.previewImg || ''} onChange={e => onUpdate(block.id, 'previewImg', e.target.value)} placeholder="이미지 링크 또는 텍스트 입력" className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-pink-500 outline-none" /></div>
                    </div>

                    <div className="bg-[#1a1c26] p-4 rounded-xl border border-[#303340] space-y-3 mt-4 shadow-inner">
                      <div className="text-xs font-bold text-[#7387ff] mb-2 flex items-center gap-1.5"><ImageIcon size={14}/> 2. 하단 배너 카드 설정</div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">배너 내 문구 (좌/상단)</label><textarea value={block.data?.copy || ''} onChange={e => onUpdate(block.id, 'copy', e.target.value)} rows={2} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-[#7387ff] outline-none resize-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">배너 내 이미지 URL (우/하단)</label><input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} placeholder="이미지 링크 또는 텍스트 입력" className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-[#7387ff] outline-none" /></div>
                      <div><label className="block text-[10px] font-bold text-slate-400 mb-1">랜딩값</label><input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} className="w-full bg-[#12141c] border border-[#303340] rounded-lg p-2.5 text-xs text-white focus:border-[#7387ff] outline-none" /></div>
                    </div>
                  </>
                )}
              </div>
            </div>

            <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-5 shadow-xl flex justify-between items-center cursor-pointer hover:bg-[#1a1c26]" onClick={() => setLocalShowSafeZone(!localShowSafeZone)}>
              <span className="text-sm font-bold text-slate-300 flex items-center gap-2"><Grid size={16} className="text-[#7387ff]"/> TV 화면 가이드라인</span>
              <div className={`w-10 h-5 rounded-full relative transition-colors ${localShowSafeZone ? 'bg-[#7387ff]' : 'bg-slate-700'}`}>
                <div className={`w-3.5 h-3.5 rounded-full bg-white absolute top-0.5 transition-transform ${localShowSafeZone ? 'left-[22px]' : 'left-[3px]'}`}></div>
              </div>
            </div>
          </div>

          {/* ========================================================= */}
          {/* 2. 시뮬레이터 프리뷰 영역 (Right Column) */}
          {/* ========================================================= */}
          <div className="flex-1 flex flex-col items-center justify-center p-8 bg-[#06070a] border border-[#1a1c26] rounded-2xl overflow-y-auto relative shadow-inner min-w-[700px] custom-scrollbar">
            
            <div className="absolute top-0 left-1/2 -translate-x-1/2 mt-6 flex items-center gap-2 text-[#7387ff] bg-[#7387ff]/10 px-4 py-1.5 rounded-full border border-[#7387ff]/30 z-20 shadow-md">
              <Grid size={14}/>
              <span className="text-xs font-bold tracking-tight">편성 메뉴: {block.data?.gnb || '미지정'}</span>
            </div>

            {block.type === 'TODAY_BTV' ? (
              /* --- Today B tv Mockup --- */
              <div className="relative w-full aspect-[16/9] max-w-[1000px] bg-[#0a0a0f] rounded-[24px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.9)] border-[8px] border-[#1a1a1a] shrink-0 mt-8">
                <div className="absolute inset-0 bg-[#0a0a0f]"></div>
                <div className="absolute inset-0 bg-no-repeat bg-right-top transition-all duration-500" style={{ backgroundImage: checkIsUrl(block.data?.imageUrl) ? `url(${block.data.imageUrl})` : 'none', backgroundSize: '75% 85%' }}>
                  {checkHasText(block.data?.imageUrl) && <div className="ml-[40%] h-full flex items-center justify-center text-white/20 text-[5rem] font-black select-none italic">{block.data.imageUrl}</div>}
                  {!checkIsUrl(block.data?.imageUrl) && !checkHasText(block.data?.imageUrl) && <div className="absolute inset-0 bg-gradient-to-bl from-[#1e1b4b] to-[#0a0a0f] opacity-50"></div>}
                </div>
                <div className="absolute inset-0 w-[60%] bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent z-10 pointer-events-none"></div>
                <div className="absolute inset-0 top-[55%] bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent z-10 pointer-events-none"></div>
                
                <div className="absolute inset-0 z-20 flex flex-col pointer-events-none text-white">
                  <div className="absolute left-0 top-0 bottom-0 w-[80px] flex flex-col items-center pt-16 pb-8 gap-8 opacity-70 border-r border-white/5"><Menu size={22}/><Tv size={22}/><Home size={26} className="text-white drop-shadow-md opacity-100"/><Grid size={22}/><Settings size={22} className="mt-auto opacity-50"/></div>
                  <div className="absolute left-[100px] top-[42%] -translate-y-1/4 w-[38%] pl-2">
                    <h3 className="text-[#32d782] text-sm font-bold mb-2 tracking-tight">{block.data?.topText || '상단 카피'}</h3>
                    <h1 className="text-white text-3xl font-black mb-3 leading-[1.15] whitespace-pre-wrap tracking-tighter drop-shadow-lg">{block.data?.mainTitle || '타이틀 입력'}</h1>
                    <p className="text-slate-200 text-xs font-medium leading-[1.6] drop-shadow-md">{block.data?.subText || '서브 텍스트'}</p>
                    <div className="mt-5 inline-flex bg-[#4631e6] text-white px-5 py-2 rounded font-bold text-xs shadow-xl">자세히 보기</div>
                  </div>
                  <div className="absolute bottom-8 left-[100px] right-0 flex gap-4 pr-8">
                    {['1','2','3'].map(i => <div key={i} className="w-[185px] h-[104px] bg-[#1e2029]/80 rounded-xl border border-white/10 shadow-lg"></div>)}
                  </div>
                </div>

                {localShowSafeZone && (
                  <div className="absolute inset-0 z-30 pointer-events-none opacity-60">
                    <div className="absolute left-[50%] top-0 bottom-0 w-px border-l-[1.5px] border-dashed border-white/60"></div>
                    <div className="absolute top-[45%] left-0 right-0 h-px border-t-[1.5px] border-dashed border-white/60"></div>
                    <div className="absolute right-[4%] top-[15%] bottom-[28%] left-[53%] bg-[#00bcd4]/20 border border-[#00bcd4]/60 flex items-center justify-center"><span className="text-white font-black text-xl bg-black/50 px-3 py-1 rounded">이미지 안전 영역</span></div>
                    <div className="absolute left-[100px] top-[22%] bottom-[40%] w-[38%] bg-pink-500/10 border border-dashed border-pink-500/50 flex items-start p-2"><span className="text-pink-100 text-[9px] font-bold bg-pink-600/90 px-1.5 py-0.5 rounded">텍스트 최대 2줄</span></div>
                    <div className="absolute left-0 right-0 bottom-0 h-[28%] border-t-[1.5px] border-dashed border-orange-500 bg-orange-500/10 flex items-end justify-center pb-4"><span className="font-bold text-[10px] px-3 py-1 rounded bg-orange-600/90 text-white">하단 썸네일 침범 금지</span></div>
                  </div>
                )}
              </div>
            ) : isBanner123 && (
              /* --- 일반 배너 (1, 2, 3단) Mockup --- */
              /* 사용자의 캡처 이미지 가이드: "TV 포커스 상태 (배경 + 카드)" 완벽 구현 */
              <div className="relative w-full aspect-[16/9] max-w-[1000px] bg-[#0a0a0f] rounded-[24px] overflow-hidden shadow-2xl border-[6px] border-[#222] shrink-0 mt-8">
                
                {/* 1. 배경 프리뷰 영역 (우상단 이미지 + 좌상단 텍스트) */}
                <div className="absolute inset-0 h-[80%] z-0">
                  {/* 우상단 배경 이미지 */}
                  <div className="absolute right-0 top-0 bottom-0 w-[65%] bg-no-repeat bg-cover bg-center transition-all duration-500" style={{backgroundImage: checkIsUrl(block.data?.previewImg) ? `url(${block.data.previewImg})` : 'none'}}>
                    {!checkIsUrl(block.data?.previewImg) && <div className="absolute inset-0 bg-gradient-to-bl from-indigo-900/30 to-[#0a0a0f]"></div>}
                    {checkHasText(block.data?.previewImg) && <div className="absolute inset-0 flex items-center justify-center text-white/10 text-[5rem] font-black italic select-none pl-[20%]">{block.data.previewImg}</div>}
                    <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent"></div>
                    <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#0a0a0f]"></div>
                  </div>
                  {/* 좌상단 텍스트 영역 */}
                  <div className="absolute left-[80px] top-[15%] w-[45%] z-10 flex flex-col gap-2">
                    <h1 className="text-white text-[2.2rem] font-black leading-[1.15] whitespace-pre-wrap tracking-tighter drop-shadow-xl">{block.data?.previewTitle || '프리뷰 메인 문구'}</h1>
                    <p className="text-slate-300 text-sm font-medium leading-[1.6] whitespace-pre-wrap mt-2">{block.data?.previewSub || '프리뷰 서브 텍스트'}</p>
                  </div>
                </div>

                {/* 2. 하단 배너 카드 영역 */}
                <div className="absolute bottom-[8%] left-[80px] right-0 flex items-end gap-5 z-20 overflow-hidden pr-8">
                  {/* 2-1. 메인 포커스된 배너 카드 */}
                  <div className={`relative rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-[3px] border-white ring-[5px] ring-[#7387ff]/40 transition-all flex bg-[#1a1c26] shrink-0
                    ${block.type === 'BANNER_1_COL' ? 'w-[170px] aspect-[62/89] flex-col' : 
                      block.type === 'BANNER_3_COL' ? 'w-[680px] aspect-[196/89]' : 'w-[400px] aspect-[129/89]'}`}
                  >
                    {block.type === 'BANNER_1_COL' ? (
                      /* 1단 배너: 상하 분할 구조 */
                      <>
                        {block.data?.copy && (
                          <div className="w-full h-[35%] p-4 pb-2 text-left z-10 flex items-center">
                            <p className="text-white font-extrabold text-[15px] leading-tight tracking-tighter whitespace-pre-wrap drop-shadow-md">{block.data.copy}</p>
                          </div>
                        )}
                        <div className="flex-1 w-full bg-cover bg-center z-0 relative border-t border-[#303340]" style={{ backgroundImage: checkIsUrl(block.data?.imageUrl) ? `url(${block.data.imageUrl})` : 'none' }}>
                          {!checkIsUrl(block.data?.imageUrl) && <div className="absolute inset-0 bg-[#0a0a0f] flex items-center justify-center"><ImageIcon size={20} className="text-white/10"/></div>}
                          {checkHasText(block.data?.imageUrl) && <div className="absolute inset-0 flex items-center justify-center text-white/20 text-xl font-black italic px-2 text-center">{block.data.imageUrl}</div>}
                          <div className="absolute inset-0 bg-gradient-to-t from-[#1a1c26] to-transparent opacity-40"></div>
                        </div>
                      </>
                    ) : (
                      /* 2, 3단 배너: 좌우 분할 구조 */
                      <>
                        <div className="w-[45%] h-full flex flex-col justify-center items-start p-6 z-10 bg-gradient-to-r from-[#1a1c26] to-[#1a1c26]/90">
                          <p className={`text-white font-extrabold leading-[1.1] tracking-tighter whitespace-pre-wrap drop-shadow-md ${block.type === 'BANNER_3_COL' ? 'text-3xl' : 'text-xl'}`}>
                            {block.data?.copy || '카드 문구'}
                          </p>
                        </div>
                        <div className="w-[55%] h-full bg-cover bg-center z-0 relative border-l border-[#303340] bg-[#0a0a0f]" style={{ backgroundImage: checkIsUrl(block.data?.imageUrl) ? `url(${block.data.imageUrl})` : 'none' }}>
                          {!checkIsUrl(block.data?.imageUrl) && <div className="absolute inset-0 flex items-center justify-center"><ImageIcon size={32} className="text-white/10"/></div>}
                          {checkHasText(block.data?.imageUrl) && <div className="absolute inset-0 flex items-center justify-center text-white/20 text-3xl font-black italic px-4 text-center">{block.data.imageUrl}</div>}
                          <div className="absolute inset-0 bg-gradient-to-r from-[#1a1c26] via-[#1a1c26]/30 to-transparent"></div>
                        </div>
                      </>
                    )}
                  </div>
                  
                  {/* 2-2. 우측 더미 카드들 */}
                  <div className="w-[280px] aspect-[129/89] bg-[#1e2029]/80 rounded-xl border border-white/10 shrink-0 shadow-lg"></div>
                  <div className="w-[280px] aspect-[129/89] bg-[#1e2029]/80 rounded-xl border border-white/10 shrink-0 shadow-lg"></div>
                </div>

                {/* TV 가이드라인 오버레이 */}
                {localShowSafeZone && (
                  <div className="absolute inset-0 z-30 pointer-events-none opacity-60">
                    <div className="absolute right-[4%] top-[10%] bottom-[45%] left-[50%] border-2 border-[#00bcd4] bg-[#00bcd4]/10 flex items-center justify-center"><span className="text-[#00bcd4] font-black text-xl bg-black/40 px-2 py-1 rounded">배경 이미지 권장 영역</span></div>
                    <div className="absolute left-[80px] top-[10%] bottom-[45%] w-[40%] border-2 border-pink-500 bg-pink-500/10 flex items-start p-2"><span className="text-pink-300 text-xs font-bold bg-black/60 px-2 py-1 rounded">배경 텍스트 권장 영역</span></div>
                  </div>
                )}
              </div>
            )}

            <div className="mt-6 text-slate-500 text-[10px] font-mono bg-[#161820]/50 px-4 py-2 rounded-full border border-[#2e3038] flex items-center gap-2">
              <ImageIcon size={12}/> 
              배너 카드에 포커스 되었을 때의 TV 화면을 시뮬레이션 합니다. (유형: {block.type})
            </div>
          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      const [appView, setAppView] = useState('CAMPAIGN_MANAGER'); 
      const [campaignMeta, setCampaignMeta] = useState({ campaignName: '신규 캠페인', target: 'MASS', toneAndManner: '타이틀 이미지 중심', assignee: '담당자', epicLink: 'BTVEVT-0000', fixVersion: '26년_04월_정기', startDate: '2026-04-01', dueDate: '2026-04-30' });
      
      const [assets, setAssets] = useState([
        { id: 'asset-1', type: 'TODAY_BTV', name: 'Today B tv', data: { ...DEFAULT_TODAY_BTV } },
        { id: 'asset-2', type: 'BANNER_2_COL', name: 'OTT홈 2단 배너', data: { ...DEFAULT_BANNER } },
        { id: 'asset-3', type: 'BANNER_1_COL', name: '키즈 1단 배너', data: { ...DEFAULT_BANNER, copy: '우리아이\n인기만점', previewTitle: '아이들이 좋아하는\n캐릭터 총집합' } },
        { id: 'asset-4', type: 'BANNER_3_COL', name: '영화 3단 와이드', data: { ...DEFAULT_BANNER, copy: '최신 영화 특별전', previewTitle: '집에서 즐기는\n최신 블록버스터' } }
      ]);
      
      const [activeTabId, setActiveTabId] = useState('OVERVIEW');
      const [isAddAssetModalOpen, setIsAddAssetModalOpen] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, payloads: [] });

      const handleMetaChange = (e) => setCampaignMeta({ ...campaignMeta, [e.target.name]: e.target.value });
      const handleAssetChange = (id, field, value) => setAssets(assets.map(asset => asset.id === id ? { ...asset, data: { ...asset.data, [field]: value } } : asset));

      const addAsset = (type, name) => {
        const newId = `asset-${Date.now()}`;
        const newData = type === 'TODAY_BTV' ? { ...DEFAULT_TODAY_BTV } : { ...DEFAULT_BANNER };
        setAssets([...assets, { id: newId, type, name, data: newData }]);
        setActiveTabId(newId);
        setIsAddAssetModalOpen(false);
      };

      const removeAsset = (id, e) => {
        e.stopPropagation();
        if (assets.length === 1) return alert('최소 1개 제작물은 유지해야 합니다.');
        setAssets(assets.filter(a => a.id !== id));
        if (activeTabId === id) setActiveTabId('OVERVIEW');
      };

      const handleExport = () => {
        const payloads = assets.map(asset => {
          const targetGnb = asset.type === 'TODAY_BTV' ? '홈 최상단' : (asset.data.gnb || '미지정');
          const description = `h3. 📌 캠페인 공통 정보\n| *캠페인명* | ${campaignMeta.campaignName} |\n| *편성 GNB* | ${targetGnb} |\n\n---\n\nh3. 🖼️ 상세 기획\n* ${asset.type === 'TODAY_BTV' ? `문구: ${asset.data.mainTitle}` : `카피: ${asset.data.copy}`}\n* 랜딩: ${asset.data.landingValue}`;
          return { action: "CREATE_JIRA_ISSUE", data: { issueTitle: `[디자인] ${campaignMeta.campaignName} - ${asset.name}`, description } };
        });
        setModalState({ isOpen: true, payloads });
      };

      const copyToClipboard = () => {
        const fullText = modalState.payloads.map(p => `[${p.data.issueTitle}]\n${p.data.description}`).join('\n\n');
        navigator.clipboard.writeText(fullText);
        alert('마크다운이 복사되었습니다.');
      };

      const activeAsset = assets.find(a => a.id === activeTabId);
      const getAssetIcon = (type) => {
        const spec = BANNER_SPECS.find(s => s.type === type);
        return spec ? <spec.icon size={16} /> : <ImageIcon size={16} />;
      };

      // GNB Sidebar State (CMS 기능 유지)
      const [gnbList] = useState(INITIAL_GNB_TREE);
      const [expandedMenuIds, setExpandedMenuIds] = useState(['2']); 
      const [currentMenuPath, setCurrentMenuPath] = useState('홈');
      const [currentMenuId, setCurrentMenuId] = useState('1');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);

      const handleMenuChange = (id, path, isLeaf = true) => {
          if (!isLeaf) { setExpandedMenuIds(prev => prev.includes(id) ? prev.filter(eid => eid !== id) : [...prev, id]); return; }
          setCurrentMenuId(id); setCurrentMenuPath(path);
      };

      return (
        <div className="flex h-screen w-full bg-[#0a0812] text-slate-200 overflow-hidden select-none">
          
          {/* Global Nav (AI Copilot 복구) */}
          <nav className="w-[72px] bg-[#0f111a] border-r border-[#262833] flex flex-col items-center py-6 z-30 shrink-0">
            <div className="w-11 h-11 bg-gradient-to-br from-[#7387ff] to-[#4631e6] rounded-xl flex items-center justify-center mb-10 shadow-lg shadow-[#7387ff]/20">
              <Tv className="text-white" size={24} />
            </div>
            <div className="flex flex-col gap-6 w-full px-3">
              <button onClick={() => setAppView('AI_COPILOT')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'AI_COPILOT' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white hover:bg-[#1a1c26]'}`} title="AI 코파일럿">
                <Bot size={26} />
              </button>
              <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'CAMPAIGN_MANAGER' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white hover:bg-[#1a1c26]'}`} title="캠페인 매니저">
                <LayoutTemplate size={26} />
              </button>
            </div>
            <div className="mt-auto w-full px-3"><button className="w-full aspect-square rounded-xl flex items-center justify-center text-slate-500 hover:text-white hover:bg-[#1a1c26] transition-all"><Settings size={24} /></button></div>
          </nav>

          {appView === 'AI_COPILOT' ? (
            /* --- AI Copilot View --- */
            <div className="flex-1 flex flex-col items-center justify-center bg-[#0a0812] animate-in fade-in duration-500 relative overflow-hidden">
               <div className="absolute inset-0 bg-gradient-to-br from-[#4631e6]/10 to-transparent"></div>
               <div className="text-center space-y-4 relative z-10">
                 <div className="w-24 h-24 bg-[#7387ff]/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-[#7387ff]/30 shadow-[0_0_50px_rgba(115,135,255,0.2)]">
                   <Sparkles size={48} className="text-[#7387ff] animate-pulse" />
                 </div>
                 <h2 className="text-3xl font-black text-white tracking-tight">AI 프로모션 제안 시스템</h2>
                 <p className="text-slate-400 mt-2 text-sm leading-relaxed max-w-md mx-auto">프로모션 목적과 예산을 입력하면 최적의 매체 조합과 카피 가안을 AI가 자동으로 제안해 주는 기능이 준비 중입니다.</p>
                 <div className="pt-8">
                   <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className="px-8 py-3.5 bg-[#7387ff] hover:bg-[#5b6dbf] text-white rounded-xl font-bold transition-all shadow-lg shadow-[#7387ff]/30 hover:-translate-y-1">수동 기획 화면으로 돌아가기</button>
                 </div>
               </div>
            </div>
          ) : (
            <>
              {/* --- Campaign Manager View --- */}
              {/* Sidebar: GNB Tree + Meta */}
              <aside className={`${isSidebarOpen ? 'w-[320px] border-r' : 'w-0 border-none'} bg-[#12141c] border-[#262833] flex flex-col h-full z-10 transition-all duration-300 overflow-hidden shrink-0`}>
                <div className="w-[320px] flex flex-col h-full">
                  <div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center">
                    <div>
                      <h1 className="text-xl font-black text-white tracking-tight">B tv Campaign</h1>
                      <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mt-1">CMS Orchestrator</p>
                    </div>
                    <button onClick={() => setIsSidebarOpen(false)} className="text-slate-500 hover:text-white p-1 rounded-md hover:bg-slate-800"><ChevronLeft size={18}/></button>
                  </div>
                  
                  <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                    {/* GNB Tree Section */}
                    <div>
                      <h2 className="text-[11px] font-bold text-[#7387ff] uppercase mb-3 flex items-center gap-1.5"><Layout size={14}/> 서비스 편성 메뉴</h2>
                      <div className="bg-[#0a0812] border border-[#262833] rounded-xl overflow-hidden py-2">
                        {gnbList.map(menu => (
                          <div key={menu.id}>
                            <div className={`flex items-center gap-2 px-4 py-2.5 cursor-pointer hover:bg-[#1a1c26] ${currentMenuId === menu.id ? 'bg-[#7387ff]/10 border-l-[3px] border-[#7387ff]' : 'border-l-[3px] border-transparent'}`} onClick={() => handleMenuChange(menu.id, menu.name, (menu.children || []).length === 0)}>
                              <div className={`flex-1 flex items-center gap-2 ${currentMenuId === menu.id || (menu.children?.length > 0 && expandedMenuIds.includes(menu.id)) ? 'text-white font-bold' : 'text-slate-400 font-medium'}`}>
                                <span className="text-sm">{menu.name}</span>
                                {menu.children && menu.children.length > 0 && <span className="ml-auto opacity-50">{expandedMenuIds.includes(menu.id) ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}</span>}
                              </div>
                            </div>
                            {menu.children && menu.children.length > 0 && expandedMenuIds.includes(menu.id) && (
                              <div className="bg-[#12141c]/50 pb-1">
                                {menu.children.map(child => (
                                  <div key={child.id} className={`pl-10 pr-4 py-2 text-xs cursor-pointer hover:bg-[#1a1c26] ${currentMenuId === child.id ? 'text-[#7387ff] font-bold' : 'text-slate-500 font-medium'}`} onClick={() => handleMenuChange(child.id, `${menu.name} > ${child.name}`, true)}>
                                    {child.name}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Campaign Meta Section */}
                    <div>
                      <h2 className="text-[11px] font-bold text-slate-500 uppercase flex items-center gap-1.5 mb-3"><Calendar size={14}/> 릴리스 정보</h2>
                      <div className="space-y-4">
                        <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Project Name</label><input type="text" name="campaignName" value={campaignMeta.campaignName} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                        <div className="grid grid-cols-2 gap-3">
                          <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Start Date</label><input type="date" name="startDate" value={campaignMeta.startDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white" /></div>
                          <div><label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Due Date</label><input type="date" name="dueDate" value={campaignMeta.dueDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white" /></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </aside>

              {/* Main Workspace */}
              <main className="flex-1 flex flex-col min-w-0 bg-[#06070a] relative">
                <header className="bg-[#12141c]/90 backdrop-blur z-20 sticky top-0 flex flex-col shadow-sm border-b border-[#262833]">
                  <div className="flex justify-between items-end px-6 pt-3">
                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar">
                      {!isSidebarOpen && (
                        <button onClick={() => setIsSidebarOpen(true)} className="p-2 mr-2 text-slate-400 hover:text-white hover:bg-[#1a1c26] rounded-lg transition-colors"><Menu size={18}/></button>
                      )}
                      <div onClick={() => setActiveTabId('OVERVIEW')} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === 'OVERVIEW' ? 'bg-[#1e202c] text-[#7387ff] border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-white'}`}><ListTodo size={16}/><span>관리 목록</span></div>
                      {assets.map(asset => (
                        <div key={asset.id} onClick={() => setActiveTabId(asset.id)} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === asset.id ? 'bg-[#1e202c] text-white border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-white'}`}>
                          <span className={activeTabId === asset.id ? 'text-[#7387ff]' : 'text-slate-500'}>{getAssetIcon(asset.type)}</span><span className="truncate max-w-[120px] ml-1">{asset.name}</span>
                          <button onClick={(e) => removeAsset(asset.id, e)} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-all ml-1"><Trash2 size={12}/></button>
                        </div>
                      ))}
                    </div>
                    <div className="pb-3 ml-4 flex gap-2 shrink-0">
                      <button onClick={() => setIsAddAssetModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-[#1a1c26] text-white rounded-xl text-xs font-bold border border-[#303340] hover:bg-[#262833] transition-colors"><Plus size={14} className="text-[#7387ff]"/> 슬롯 추가</button>
                      <button onClick={handleExport} className="flex items-center gap-2 px-5 py-2 bg-[#4f3df6] hover:bg-[#3a2ac4] text-white rounded-xl text-xs font-bold transition-all shadow-lg shadow-[#4f3df6]/20"><Send size={14} /> Jira 전송</button>
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                  {activeTabId === 'OVERVIEW' ? (
                    <div className="p-8 max-w-5xl mx-auto animate-in fade-in duration-300">
                      <div className="bg-[#12141c] border border-[#262833] rounded-2xl overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center"><div><h3 className="text-base font-bold text-white flex items-center gap-2"><ListTodo size={18} className="text-[#7387ff]" /> 일감 생성 리스트 ({assets.length}건)</h3></div></div>
                        <table className="w-full text-left border-collapse">
                          <tbody className="text-sm text-slate-200">
                            {assets.map((asset, idx) => (
                              <tr key={idx} className="border-b border-[#262833] hover:bg-[#1a1c26] cursor-pointer group transition-colors" onClick={() => setActiveTabId(asset.id)}>
                                <td className="p-5 font-medium text-slate-300 flex items-center gap-3 w-1/4"><div className="p-2 bg-[#262833] rounded-lg text-slate-400 group-hover:text-[#7387ff] transition-colors">{getAssetIcon(asset.type)}</div>{asset.name}</td>
                                <td className="p-5 font-bold text-[#7387ff] w-1/2">[디자인] {campaignMeta.campaignName} - {asset.name}</td>
                                <td className="p-5 text-right w-1/4"><span className="text-[10px] font-bold bg-slate-800 border border-slate-700 text-slate-400 px-3 py-1.5 rounded-full uppercase tracking-wider">Ready</span></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  ) : (
                    <BlockRenderer block={activeAsset} onUpdate={handleAssetChange} />
                  )}
                </div>
              </main>
            </>
          )}

          {/* Add Asset Modal */}
          {isAddAssetModalOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in zoom-in-95 duration-200">
              <div className="bg-[#12141c] w-[900px] border border-[#262833] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]">
                  <h3 className="text-xl font-black text-white flex items-center gap-2"><PlusCircle size={22} className="text-[#7387ff]"/> 매체 규격 추가</h3>
                  <button onClick={() => setIsAddAssetModalOpen(false)} className="p-1.5 hover:bg-slate-800 rounded-full text-slate-400 hover:text-white transition-colors"><X size={20}/></button>
                </div>
                <div className="p-8 grid grid-cols-2 lg:grid-cols-3 gap-5 max-h-[70vh] overflow-y-auto custom-scrollbar bg-[#0a0812]">
                  {BANNER_SPECS.map((spec) => (
                    <div key={spec.type} onClick={() => addAsset(spec.type, spec.name)} className="bg-[#1a1c26] border border-[#303340] rounded-2xl p-6 cursor-pointer hover:border-[#7387ff] hover:-translate-y-1 transition-all flex flex-col h-full group shadow-md">
                      <div className="flex items-start justify-between mb-4"><div className="p-3 bg-[#262833] rounded-xl text-[#7387ff] group-hover:bg-[#7387ff] group-hover:text-white transition-colors"><spec.icon size={24} /></div><span className="text-[10px] font-bold bg-[#0a0812] border border-[#303340] text-slate-400 px-2 py-1 rounded-md">{spec.ratio}</span></div>
                      <h4 className="text-lg font-bold text-white mb-1 group-hover:text-[#7387ff] transition-colors">{spec.name}</h4>
                      <p className="text-xs text-slate-500 leading-relaxed mt-auto pt-4 border-t border-[#262833]">{spec.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Jira Wizard Modal */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-in fade-in">
              <div className="bg-[#12141c] w-[650px] border border-[#262833] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]"><h3 className="text-base font-bold text-white flex items-center gap-2"><Send size={20} className="text-[#4f3df6]" /> Jira 일감 전송 워크플로우</h3><button onClick={() => setModalState({ isOpen: false })}><X size={18}/></button></div>
                <div className="p-10 flex flex-col gap-8">
                  <div className="flex gap-5 items-start"><div className="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center shrink-0 border border-blue-500/20"><CheckCircle size={24}/></div><div><h4 className="text-white font-bold mb-1">1단계: 데이터 패킹 완료</h4><p className="text-sm text-slate-500 leading-relaxed">총 <strong className="text-white">{modalState.payloads.length}건</strong>의 기획 데이터가 준비되었습니다.</p></div></div>
                  <div className="flex gap-5 items-start"><div className="w-10 h-10 rounded-full bg-[#262833] text-slate-300 flex items-center justify-center shrink-0 border border-[#303340] font-black">2</div><div className="w-full"><h4 className="text-white font-bold mb-1">2단계: 지라(Jira) 확장 매크로 실행</h4><p className="text-sm text-slate-500 mb-4 tracking-tight">BTVEVT 프로젝트 화면에서 'B tv Campaign 매크로'를 실행하세요.</p><div className="bg-[#06070a] border border-[#262833] rounded-2xl p-4 flex items-center justify-between"><span className="text-[11px] text-slate-500 font-mono italic">Ready to Transfer: {modalState.payloads.length} items</span><button onClick={copyToClipboard} className="text-xs text-[#7387ff] font-bold border border-[#7387ff]/30 px-3 py-1.5 rounded-lg hover:bg-[#7387ff] hover:text-white transition-all"><Copy size={14} className="inline mr-1"/> 마크다운 복사</button></div></div></div>
                </div>
                <div className="p-6 bg-[#0f111a] border-t border-[#262833] flex justify-end"><button onClick={() => setModalState({ isOpen: false })} className="px-8 py-2.5 bg-[#262833] text-white text-sm font-bold rounded-xl transition-all hover:bg-[#32343d]">닫기</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
