<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; font-family: 'Pretendard', -apple-system, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    // [해결] User 아이콘 추가
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Smile, Settings, Calendar, GitMerge, Plus, Trash2, Image as ImageIcon,
      ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, ArrowRight, X, Target, Edit3, User
    } from 'lucide-react';

    // --- Specifications & Templates ---
    const BANNER_SPECS = [
      { type: 'TODAY_BTV', name: 'Today B tv', icon: MonitorPlay, ratio: '16:9', size: '3840 x 2160', max: 'Max 4MB', desc: '홈 화면 최상단 대형 롤링 배너. 텍스트/인물 안전영역 준수 필수.' },
      { type: 'BANNER_2_COL', name: '2단 배너', icon: ImageIcon, ratio: '16:9', size: '1920 x 1080', max: 'Max 2MB', desc: '주요 메뉴 하단에 노출되는 범용적인 가로형 배너.' },
      { type: 'BANNER_1_COL', name: '1단 배너', icon: LayoutPanelLeft, ratio: '3:4', size: '1080 x 1440', max: 'Max 2MB', desc: '포스터 비율의 세로형 배너. 콘텐츠 강조에 적합.' },
      { type: 'LONG_BANNER', name: '롱배너', icon: Smartphone, ratio: '1:2', size: '800 x 1600', max: 'Max 3MB', desc: '세로로 길게 노출되는 배너. 카피 가독성이 매우 중요함.' },
      { type: 'BAND_BANNER', name: '띠배너', icon: ImageIcon, ratio: '8:1', size: '3840 x 480', max: 'Max 2MB', desc: '콘텐츠 블록 사이에 삽입되는 얇고 긴 형태의 프로모션 배너.' },
    ];

    const DEFAULT_TODAY_BTV = {
      topText: '디즈니+ 런칭',
      mainTitle: '원작의 느낌 그대로.\n리메이크 콘텐츠 특집',
      subText: '지금 가입하고 디즈니+의\n최신 콘텐츠를 감상하세요',
      landingValue: '가입 유도 랜딩',
      buttonText: '바로 보기',
      imageUrl: '',
    };

    const DEFAULT_BANNER = {
      copy: '지금 10%할인 쿠폰받고\n디즈니+의 최신 콘텐츠를 감상하세요',
      landingValue: '가입 유도 랜딩 (UI_PATH: /join)',
      buttonText: '자세히 보기',
      imageUrl: '',
    };

    // --- BlockRenderer (배너 개별 렌더링 및 뷰어) ---
    const BlockRenderer = ({ block, onUpdate, onRemove, readOnly = false }) => {
      const [localShowSafeZone, setLocalShowSafeZone] = useState(true);
      // 에러 방지 안전망 추가
      const hasImage = Boolean(block?.data?.imageUrl && typeof block.data.imageUrl === 'string' && block.data.imageUrl.trim() !== '');

      const getPreviewClasses = (type) => {
        switch(type) {
          case 'BANNER_1_COL': return 'aspect-[3/4] w-[300px] max-w-full'; 
          case 'BANNER_2_COL': return 'aspect-[16/9] w-[500px] max-w-full'; 
          case 'LONG_BANNER': return 'aspect-[1/2] w-[240px] max-w-full'; 
          case 'BAND_BANNER': return 'aspect-[8/1] w-[800px] max-w-full'; 
          default: return 'aspect-[16/9] w-[500px] max-w-full';
        }
      };

      return (
        <div className="p-6 flex flex-col xl:flex-row gap-6 min-h-[calc(100vh-80px)] animate-in fade-in duration-300">
          {/* Form Column */}
          <div className="w-full xl:w-[380px] flex-shrink-0 space-y-6">
            <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 space-y-5 shadow-2xl">
              <div className="flex justify-between items-center border-b border-[#262833] pb-4 mb-2">
                <h3 className="text-base font-extrabold text-white flex items-center gap-2">
                  <span className="p-1.5 bg-[#7387ff]/20 text-[#7387ff] rounded-lg">
                    {block.type === 'TODAY_BTV' ? <MonitorPlay size={16}/> : block.type === 'LONG_BANNER' ? <Smartphone size={16}/> : <ImageIcon size={16}/>}
                  </span>
                  {block.name} 기획
                </h3>
              </div>
              
              {block.type === 'TODAY_BTV' ? (
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1.5">상단 텍스트</label>
                    <input type="text" value={block.data?.topText || ''} onChange={e => onUpdate(block.id, 'topText', e.target.value)} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1.5">메인 타이틀 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label>
                    <textarea value={block.data?.mainTitle || ''} onChange={e => onUpdate(block.id, 'mainTitle', e.target.value)} rows={2} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none resize-none transition-all shadow-sm leading-relaxed" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1.5">서브 텍스트 <span className="text-[10px] font-normal text-slate-500">(최대 2줄)</span></label>
                    <textarea value={block.data?.subText || ''} onChange={e => onUpdate(block.id, 'subText', e.target.value)} rows={3} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none resize-none transition-all shadow-sm leading-relaxed" />
                  </div>
                </div>
              ) : (
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1.5">배너 주요 카피</label>
                    <textarea value={block.data?.copy || ''} onChange={e => onUpdate(block.id, 'copy', e.target.value)} rows={4} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none resize-none transition-all shadow-sm leading-relaxed" />
                  </div>
                </div>
              )}
              
              <div className="pt-2 border-t border-[#262833] space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1.5">랜딩값 <span className="text-[10px] font-normal text-slate-500">(선택 시 동작)</span></label>
                  <input type="text" value={block.data?.landingValue || ''} onChange={e => onUpdate(block.id, 'landingValue', e.target.value)} placeholder="예: UI_PATH: /join/monthly" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1.5 flex justify-between">
                    버튼명 <span className="text-[10px] font-normal text-slate-500">옵션</span>
                  </label>
                  <input type="text" value={block.data?.buttonText || ''} onChange={e => onUpdate(block.id, 'buttonText', e.target.value)} placeholder="예: 바로 보기" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1.5 flex justify-between">
                    배경 이미지 URL <span className="text-[10px] font-normal text-slate-500">옵션</span>
                  </label>
                  <input type="text" value={block.data?.imageUrl || ''} onChange={e => onUpdate(block.id, 'imageUrl', e.target.value)} placeholder="미입력 시 기본 그라데이션 노출" className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                </div>
              </div>
            </div>

            {block.type === 'TODAY_BTV' && (
              <div className="bg-[#12141c] border border-[#262833] rounded-2xl p-6 shadow-xl">
                <button onClick={() => setLocalShowSafeZone(!localShowSafeZone)} className={`w-full py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm ${localShowSafeZone ? 'bg-[#7387ff] text-white shadow-[#7387ff]/20' : 'bg-[#1a1c26] text-slate-400 border border-[#303340] hover:text-white hover:bg-[#262833]'}`}>
                  <Grid size={18} /> TV 안전 영역(Safe Zone) {localShowSafeZone ? 'ON' : 'OFF'}
                </button>
                <p className="text-[11px] text-slate-500 mt-4 text-center leading-relaxed">
                  가이드라인을 켜고 우측 캔버스에서 주요 시각 요소가 가려지지 않는지 확인하세요.
                </p>
              </div>
            )}
          </div>

          {/* Preview Column */}
          <div className="flex-1 flex flex-col items-center justify-center p-8 bg-[#06070a] border border-[#1a1c26] rounded-2xl overflow-hidden relative shadow-inner min-w-[600px]">
            
            {/* ========================================================= */}
            {/* 1. Today B tv Mockup (실제 UI 완벽 모사) */}
            {/* ========================================================= */}
            {block.type === 'TODAY_BTV' && (
              <div className="relative w-full aspect-[16/9] max-w-[1000px] bg-[#000] rounded-[24px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.9)] border-[8px] border-[#1a1a1a]">
                
                {/* 배경 이미지: bg-right-top으로 우상단 쏠림 적용 */}
                <div className="absolute inset-0 bg-cover bg-right-top transition-all duration-500" style={{ backgroundImage: hasImage ? `url(${block.data.imageUrl})` : 'linear-gradient(135deg, #10152a 0%, #1e1b4b 50%, #000000 100%)' }}></div>
                
                {/* 텍스트 영역 그라데이션: 좌측을 더 넓고 진하게(w-[70%]) 퍼지도록 수정 */}
                <div className="absolute inset-0 w-[70%] bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent z-10 pointer-events-none"></div>
                <div className="absolute inset-0 top-[40%] bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/70 to-transparent z-10 pointer-events-none"></div>
                
                {/* 전체 UI 래퍼 */}
                <div className="absolute inset-0 z-20 flex flex-col pointer-events-none text-white">
                  
                  {/* 최좌측 GNB 네비게이션 아이콘들 */}
                  <div className="absolute left-0 top-0 bottom-0 w-[80px] flex flex-col items-center pt-16 pb-8 gap-8 opacity-70 border-r border-white/5">
                    <Menu size={22} className="opacity-50"/>
                    <Tv size={22} className="opacity-50"/>
                    <Home size={26} className="text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] opacity-100"/>
                    <Grid size={22} className="opacity-50"/>
                    <Settings size={22} className="mt-auto opacity-50"/>
                  </div>

                  {/* 상단바 (검색, 에이닷, 우측 OTT 아이콘들) */}
                  <div className="flex justify-between items-start pt-8 pl-[100px] pr-10">
                    <div className="flex gap-3">
                      <div className="w-9 h-9 rounded-full bg-slate-300/20 backdrop-blur border border-white/10 flex items-center justify-center shadow-lg">
                        <User size={18} className="text-white/80"/>
                      </div>
                      <div className="flex items-center gap-2 bg-[#1a1a24]/60 backdrop-blur-md border border-white/10 rounded-full px-5 py-2">
                        <Search size={16} className="text-white/70" /><span className="text-sm font-medium text-white/90">검색</span>
                      </div>
                      <div className="flex items-center gap-2 bg-[#1a1a24]/60 backdrop-blur-md border border-white/10 rounded-full px-5 py-2">
                        <Mic size={16} className="text-[#8997ff]" /><span className="text-sm font-medium text-white/90">에이닷과 대화해요!</span>
                      </div>
                    </div>

                    <div className="flex items-center gap-2.5 opacity-90">
                      {['Btv+', 'OTT', 'NETFLIX', 'YouTube', 'Disney+', 'tv'].map((ott, i) => (
                        <div key={i} className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[7px] font-black text-black tracking-tighter shadow-sm overflow-hidden">
                          {ott}
                        </div>
                      ))}
                    </div>
                  </div>
                  
                  {/* 메인 텍스트 콘텐츠 영역 (폰트 크기 축소 및 위치 조정) */}
                  <div className="absolute left-[100px] top-[42%] -translate-y-1/4 w-[38%] pl-2">
                    {block.data.topText && <h3 className="text-[#32d782] text-base font-bold mb-2 drop-shadow-md tracking-tight">{block.data.topText}</h3>}
                    <h1 className="text-white text-[2rem] font-black mb-4 leading-[1.2] whitespace-pre-wrap break-keep drop-shadow-[0_4px_12px_rgba(0,0,0,0.8)] tracking-tight">
                      {block.data.mainTitle || '타이틀 입력'}
                    </h1>
                    <p className="text-slate-200 text-sm font-medium mb-6 leading-[1.6] whitespace-pre-wrap break-keep drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">
                      {block.data.subText || '서브 텍스트 입력'}
                    </p>
                    {block.data.buttonText && (
                      <div className="inline-flex w-fit bg-[#4631e6] hover:bg-[#5b4df6] border border-white/10 text-white px-5 py-2 rounded-lg font-bold text-sm shadow-[0_4px_20px_rgba(70,49,230,0.6)]">
                        {block.data.buttonText}
                      </div>
                    )}
                  </div>
                  
                  {/* 하단 썸네일 및 페이징 */}
                  <div className="absolute bottom-8 left-[100px] right-0 flex flex-col gap-4">
                    {/* 페이징 인디케이터 */}
                    <div className="flex gap-1.5 px-2">
                      <div className="w-5 h-1.5 bg-white rounded-full shadow-sm"></div>
                      {[1,2,3,4,5,6,7,8,9].map(i => <div key={i} className="w-1.5 h-1.5 bg-white/40 rounded-full shadow-sm"></div>)}
                    </div>

                    {/* 썸네일 리스트 */}
                    <div className="flex gap-4 overflow-hidden pr-8">
                      {['아바타', '삼악도', '소년심판', '직장상사 길들이기', '주토피아2'].map((t, i) => (
                        <div key={i} className="w-[185px] h-[104px] bg-[#1e2029]/80 backdrop-blur-md rounded-xl border border-white/10 shadow-lg relative overflow-hidden flex flex-col justify-end p-3">
                          <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                          {i < 3 && <span className="absolute top-2 left-2 bg-pink-600/90 text-white text-[8px] px-1.5 py-0.5 rounded font-bold">이벤트</span>}
                          <span className="relative z-10 text-white text-xs font-bold truncate">{t}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* [안전 영역 오버레이] */}
                {localShowSafeZone && (
                  <div className="absolute inset-0 z-30 pointer-events-none">
                    {/* 정중앙 십자 점선 가이드 */}
                    <div className="absolute left-[50%] top-0 bottom-0 w-px border-l-[1.5px] border-dashed border-white/50"></div>
                    <div className="absolute top-[45%] left-0 right-0 h-px border-t-[1.5px] border-dashed border-white/50"></div>

                    {/* 우측 이미지 안전 영역 */}
                    <div className="absolute right-[4%] top-[15%] bottom-[28%] left-[53%] bg-[#00bcd4]/20 border border-[#00bcd4]/50 flex items-center justify-center backdrop-blur-[1px]">
                      <span className="text-white font-black text-[1.5rem] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-tight bg-black/40 px-4 py-2 rounded-lg">
                        이미지 안전 영역
                      </span>
                    </div>

                    {/* 좌측 텍스트 권장 영역 가이드 */}
                    <div className="absolute left-[100px] top-[22%] bottom-[40%] w-[38%] bg-pink-500/10 border border-dashed border-pink-500/50 flex items-start p-2">
                      <span className="text-pink-100 text-[10px] font-bold bg-pink-600/90 px-2 py-1 rounded shadow-sm">텍스트 최대 2줄</span>
                    </div>

                    {/* 하단 썸네일 침범 금지 영역 */}
                    <div className="absolute left-0 right-0 bottom-0 h-[28%] border-t-2 border-dashed border-orange-500 bg-orange-500/10 flex items-end justify-center pb-6">
                      <span className="font-bold text-xs px-4 py-1.5 rounded-lg bg-orange-600/90 text-white shadow-lg backdrop-blur">
                        하단 메뉴/썸네일 침범 금지
                      </span>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ========================================================= */}
            {/* 2. Generic Banner Mockups */}
            {/* ========================================================= */}
            {block.type !== 'TODAY_BTV' && (
              <div className="flex flex-col items-center justify-center w-full h-full relative">
                <div 
                  className={`relative bg-[#12141c] rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.6)] border border-[#303340] flex flex-col justify-center items-center text-center bg-cover bg-center transition-all duration-300 ${getPreviewClasses(block.type)}`} 
                  style={{ backgroundImage: hasImage ? `url(${block.data.imageUrl})` : 'none' }}
                >
                  {!hasImage && <div className="absolute inset-0 bg-gradient-to-br from-indigo-900 via-purple-900 to-[#12141c] opacity-70"></div>}
                  
                  {block.type === 'LONG_BANNER' && <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>}

                  <div className="relative z-10 p-8 flex flex-col items-center justify-center gap-5 w-full h-full">
                    <p className={`text-white font-extrabold whitespace-pre-wrap leading-[1.3] drop-shadow-xl ${block.type === 'BANNER_1_COL' ? 'text-2xl' : block.type === 'LONG_BANNER' ? 'text-2xl mt-auto pb-4' : 'text-3xl'} tracking-tight`}>
                      {block.data?.copy || '카피를 입력하세요'}
                    </p>
                    {block.data?.buttonText && (
                      <span className={`inline-flex items-center justify-center bg-white text-black px-6 py-2.5 rounded-full font-bold shadow-lg ${block.type === 'LONG_BANNER' ? 'text-sm mb-4' : 'text-sm'}`}>
                        {block.data.buttonText}
                      </span>
                    )}
                  </div>

                  {/* Ad Indicator for Band Banner */}
                  {block.type === 'BAND_BANNER' && <div className="absolute bottom-3 right-5 text-[10px] font-bold text-white/60 bg-black/60 px-2 py-1 rounded-md backdrop-blur">AD</div>}
                </div>
                
                <div className="absolute bottom-10 text-slate-500 text-xs font-mono bg-[#161820] px-4 py-2 rounded-full border border-[#2e3038] shadow-lg flex items-center gap-2">
                  <ImageIcon size={14}/> 매체별 권장 비율 기반 캔버스 적용 중
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      const [campaignMeta, setCampaignMeta] = useState({
        campaignName: '디즈니플러스 런칭 프로모션',
        target: '5.5.2 이상 MASS',
        toneAndManner: '‘메이드인코리아’ 타이틀 이미지 중심 활용',
        assignee: '정은샘',
        epicLink: 'BTVEVT-8000',
        fixVersion: '23년_12월_3주차_정기배포',
        startDate: '2023-12-18',
        dueDate: '2023-12-31',
      });

      const [assets, setAssets] = useState([
        { id: 'asset-1', type: 'TODAY_BTV', name: 'Today B tv', data: { ...DEFAULT_TODAY_BTV } },
        { id: 'asset-2', type: 'BANNER_2_COL', name: 'OTT홈 2단 배너', data: { ...DEFAULT_BANNER, copy: 'B tv에선 Disney+ 매월 10% 할인!' } }
      ]);

      const [activeTabId, setActiveTabId] = useState('OVERVIEW');
      const [isAddAssetModalOpen, setIsAddAssetModalOpen] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, step: 0, payloads: [] });

      const handleMetaChange = (e) => setCampaignMeta({ ...campaignMeta, [e.target.name]: e.target.value });
      
      const handleAssetChange = (id, field, value) => {
        setAssets(assets.map(asset => {
          if (asset.id === id) return { ...asset, data: { ...asset.data, [field]: value } };
          return asset;
        }));
      };

      const addAsset = (type, name) => {
        const newId = `asset-${Date.now()}`;
        const newData = type === 'TODAY_BTV' ? { ...DEFAULT_TODAY_BTV } : { ...DEFAULT_BANNER };
        setAssets([...assets, { id: newId, type, name, data: newData }]);
        setActiveTabId(newId);
        setIsAddAssetModalOpen(false);
      };

      const removeAsset = (id, e) => {
        e.stopPropagation();
        if (assets.length === 1) return alert('최소 1개의 제작물은 필요합니다.');
        const newAssets = assets.filter(a => a.id !== id);
        setAssets(newAssets);
        if (activeTabId === id) setActiveTabId('OVERVIEW');
      };

      const generateBatchPayloads = () => {
        return assets.map(asset => {
          const issueTitle = `[디자인요청] ${campaignMeta.campaignName} - ${asset.name}`;
          
          let markdown = `h3. 📌 캠페인 공통 정보\n|| 항목 || 내용 ||\n| *캠페인명* | ${campaignMeta.campaignName} |\n| *편성 일정* | ${campaignMeta.startDate} ~ ${campaignMeta.dueDate} |\n| *타겟/톤앤매너* | ${campaignMeta.target} / ${campaignMeta.toneAndManner} |\n\n---\n\n`;
          markdown += `h3. 🖼️ ${asset.name} 상세 기획\n`;
          
          if (asset.type === 'TODAY_BTV') {
            markdown += `* *상단 텍스트:* ${asset.data.topText}\n* *메인 타이틀:* ${asset.data.mainTitle.replace(/\n/g, ' ')}\n* *서브 텍스트:* ${asset.data.subText.replace(/\n/g, ' ')}\n* *버튼명:* ${asset.data.buttonText}\n* *랜딩값:* ${asset.data.landingValue}\n`;
          } else {
            markdown += `* *메인 카피:* ${asset.data.copy.replace(/\n/g, ' ')}\n* *버튼명:* ${asset.data.buttonText}\n* *랜딩값:* ${asset.data.landingValue}\n`;
          }

          return {
            action: "CREATE_JIRA_ISSUE",
            data: {
              issueTitle,
              epicLink: campaignMeta.epicLink,
              fixVersion: campaignMeta.fixVersion,
              startDate: campaignMeta.startDate,
              dueDate: campaignMeta.dueDate,
              assignee: campaignMeta.assignee,
              description: markdown
            }
          };
        });
      };

      // 2-1. 함수 수정
      const handleExportToExtension = () => {
        if (assets.length === 0) return alert('제작물이 없습니다.');
        const payloads = generateBatchPayloads();
        
        // 1. 모달 띄우기
        setModalState({ isOpen: true, step: 1, payloads });
        
        // 2. 백그라운드 확장프로그램이 대기중이라면 데이터를 쏴줌 (향후 연동용)
        window.postMessage({ type: 'BTV_CAMPAIGN_DATA', payloads }, '*');
      };

      const copyToClipboard = () => {
        const fullText = modalState.payloads.map(p => `[${p.data.issueTitle}]\n${p.data.description}`).join('\n\n====================\n\n');
        navigator.clipboard.writeText(fullText);
        alert('전체 마크다운이 클립보드에 복사되었습니다.');
      };

      const activeAsset = assets.find(a => a.id === activeTabId);

      const getAssetIcon = (type) => {
        const spec = BANNER_SPECS.find(s => s.type === type);
        const IconComponent = spec ? spec.icon : ImageIcon;
        return <IconComponent size={16} />;
      };

      return (
        <div className="flex h-screen w-full bg-[#0a0812] text-slate-200 font-sans overflow-hidden">
          
          {/* --- GLOBAL THIN NAVIGATION BAR --- */}
          <nav className="w-[72px] flex-shrink-0 bg-[#0f111a] border-r border-[#262833] flex flex-col items-center py-6 z-30">
            <div className="w-11 h-11 bg-gradient-to-br from-[#7387ff] to-[#4631e6] rounded-xl flex items-center justify-center mb-8 shadow-lg shadow-[#7387ff]/20">
              <Tv className="text-white" size={24} />
            </div>
            <div className="flex flex-col gap-4 w-full px-3">
              <button className="w-full aspect-square rounded-xl flex flex-col items-center justify-center transition-all bg-[#262833] text-[#7387ff] shadow-inner" title="캠페인 매니저">
                <LayoutTemplate size={24} />
              </button>
            </div>
            <div className="mt-auto w-full px-3">
              <button className="w-full aspect-square rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 hover:bg-[#1e2029] transition-all">
                <Settings size={24} />
              </button>
            </div>
          </nav>

          {/* === LEFT SIDEBAR: Global Campaign Meta === */}
          <aside className="w-[340px] flex-shrink-0 bg-[#12141c] border-r border-[#262833] flex flex-col h-full z-10">
            <div className="p-6 border-b border-[#262833] bg-[#0f111a]">
              <h1 className="text-xl font-extrabold text-white flex items-center gap-2 tracking-tight">B tv Campaign</h1>
              <p className="text-[11px] text-slate-400 mt-1.5 font-medium">에픽/릴리스 기반 다중 배너 기획</p>
            </div>

            <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar relative">
              <div className="sticky top-0 z-10 bg-[#12141c] pb-4">
                <button onClick={handleExportToExtension} className="w-full bg-gradient-to-r from-[#4f3df6] to-[#7387ff] hover:from-[#3a2ac4] hover:to-[#5b6dbf] text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-[0_4px_15px_rgba(79,61,246,0.3)] transition-transform transform hover:-translate-y-0.5">
                  <Send size={16} /> Jira 다중 일감 전송 <span className="bg-white/20 px-2 py-0.5 rounded-md text-xs ml-1 backdrop-blur-sm">{assets.length}건</span>
                </button>
              </div>

              <div>
                <h2 className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-1.5"><LayoutTemplate size={14} className="text-slate-400"/> 캠페인 공통 정보</h2>
                <div className="space-y-4">
                  <div><label className="block text-xs font-bold text-slate-300 mb-1.5">프로젝트(캠페인)명</label><input type="text" name="campaignName" value={campaignMeta.campaignName} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                  <div><label className="block text-xs font-bold text-slate-300 mb-1.5">타겟 대상</label><input type="text" name="target" value={campaignMeta.target} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                  <div><label className="block text-xs font-bold text-slate-300 mb-1.5">톤앤매너 (디자인 방향)</label><input type="text" name="toneAndManner" value={campaignMeta.toneAndManner} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                </div>
              </div>

              <div className="pt-2">
                <h2 className="text-[11px] font-bold text-[#7387ff] uppercase tracking-widest mb-4 flex items-center gap-1.5"><Calendar size={14}/> Jira 릴리스 및 담당자</h2>
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="block text-[11px] font-bold text-slate-300 mb-1.5">상위 에픽</label><div className="flex items-center bg-[#1a1c26] border border-[#303340] rounded-lg px-2.5 py-2"><GitMerge size={14} className="text-slate-500 mr-2"/><input type="text" name="epicLink" value={campaignMeta.epicLink} onChange={handleMetaChange} className="w-full bg-transparent text-sm text-white outline-none font-mono" /></div></div>
                    <div><label className="block text-[11px] font-bold text-slate-300 mb-1.5">릴리스(Fix)</label><input type="text" name="fixVersion" value={campaignMeta.fixVersion} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-sm text-white focus:border-[#7387ff] outline-none" /></div>
                  </div>
                  <div className="grid grid-cols-2 gap-3 bg-[#0a0812] p-4 rounded-xl border border-[#262833]">
                    <div><label className="block text-[11px] text-slate-400 mb-1">시작일</label><input type="date" name="startDate" value={campaignMeta.startDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert outline-none" /></div>
                    <div><label className="block text-[11px] text-slate-400 mb-1">종료일</label><input type="date" name="dueDate" value={campaignMeta.dueDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert outline-none" /></div>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-300 mb-1.5">지정 담당자 (Assignee)</label>
                    <div className="flex items-center gap-3 bg-[#1a1c26] border border-[#303340] rounded-lg p-2">
                      <div className="w-7 h-7 rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">{campaignMeta.assignee.charAt(0)}</div>
                      <input type="text" name="assignee" value={campaignMeta.assignee} onChange={handleMetaChange} className="bg-transparent text-sm text-white outline-none flex-1" />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          {/* === RIGHT MAIN AREA === */}
          <main className="flex-1 flex flex-col min-w-0 bg-[#06070a] relative">
            <header className="bg-[#12141c]/90 backdrop-blur z-20 sticky top-0 flex flex-col shadow-sm border-b border-[#262833]">
              <div className="flex justify-between items-end px-6 pt-4">
                <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar">
                  <div onClick={() => setActiveTabId('OVERVIEW')} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === 'OVERVIEW' ? 'bg-[#1e202c] text-[#7387ff] border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-slate-200 hover:bg-[#1a1c26]'}`}>
                    <ListTodo size={16}/><span>전체 배너 관리</span>
                  </div>
                  {assets.map(asset => (
                    <div key={asset.id} onClick={() => setActiveTabId(asset.id)} className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === asset.id ? 'bg-[#1e202c] text-white border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-slate-200 hover:bg-[#1a1c26]'}`}>
                      <span className={activeTabId === asset.id ? 'text-[#7387ff]' : 'text-slate-500'}>{getAssetIcon(asset.type)}</span><span>{asset.name}</span>
                      <button onClick={(e) => removeAsset(asset.id, e)} className="opacity-0 group-hover:opacity-100 p-1 bg-transparent hover:bg-slate-700/50 rounded-full text-slate-400 hover:text-red-400 ml-2"><Trash2 size={14}/></button>
                    </div>
                  ))}
                </div>
                <div className="pb-3 flex-shrink-0 ml-4">
                  <button onClick={() => setIsAddAssetModalOpen(true)} className="flex items-center gap-2 px-5 py-2.5 bg-[#1a1c26] hover:bg-[#262833] text-white rounded-xl text-sm font-bold border border-[#303340] shadow-sm hover:shadow-md"><Plus size={18} className="text-[#7387ff]"/> 배너 슬롯 추가</button>
                </div>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto relative custom-scrollbar">
              {activeTabId === 'OVERVIEW' && (
                <div className="p-8 max-w-5xl mx-auto animate-in fade-in duration-300">
                  <div className="bg-[#12141c] border border-[#262833] rounded-2xl overflow-hidden shadow-2xl">
                    <div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center">
                      <div><h3 className="text-base font-bold text-white flex items-center gap-2"><ListTodo size={18} className="text-[#7387ff]" /> 생성 예정 티켓 (Sub-tasks)</h3><p className="text-xs text-slate-400 mt-1.5">좌측 전송 시 아래 리스트가 개별 Jira 티켓으로 생성되며 에픽({campaignMeta.epicLink})에 묶입니다.</p></div>
                      <div className="bg-[#1a1c26] px-3 py-1.5 rounded-lg border border-[#303340] text-xs font-bold text-slate-300">총 <span className="text-[#7387ff] text-sm mx-1">{assets.length}</span>개</div>
                    </div>
                    {assets.length === 0 ? (
                      <div className="p-16 flex flex-col items-center justify-center text-slate-500"><ImageIcon size={48} className="mb-4 opacity-20" /><p className="font-bold text-lg text-slate-400">등록된 배너가 없습니다.</p></div>
                    ) : (
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-[#0a0812] text-xs text-slate-400 border-b border-[#262833]"><th className="p-4 font-bold">배너 구분</th><th className="p-4 font-bold">티켓 제목 (미리보기)</th><th className="p-4 font-bold text-center">상태</th></tr>
                        </thead>
                        <tbody className="text-sm text-slate-200">
                          {assets.map((asset, idx) => (
                            <tr key={idx} className="border-b border-[#262833] hover:bg-[#1a1c26] cursor-pointer group" onClick={() => setActiveTabId(asset.id)}>
                              <td className="p-5 font-medium text-slate-300 flex items-center gap-3"><div className="p-2 bg-[#262833] rounded-lg text-slate-400 group-hover:text-[#7387ff]">{getAssetIcon(asset.type)}</div>{asset.name}</td>
                              <td className="p-5 font-bold text-[#7387ff]">[디자인요청] {campaignMeta.campaignName || '캠페인명 미입력'} - {asset.name}</td>
                              <td className="p-5 text-center"><span className="text-[11px] font-bold bg-[#1a1c26] border border-[#303340] text-slate-400 px-3 py-1.5 rounded-full">기획 작성중</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                </div>
              )}

              {activeAsset && activeTabId !== 'OVERVIEW' && (
                <BlockRenderer block={activeAsset} onUpdate={handleAssetChange} />
              )}
            </div>
          </main>

          {/* === MODALS === */}
          {isAddAssetModalOpen && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-[#12141c] w-[900px] max-w-[90vw] border border-[#262833] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-6 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]">
                  <div><h3 className="text-xl font-extrabold text-white flex items-center gap-2"><Plus size={24} className="text-[#7387ff]" /> 추가할 배너 슬롯 선택</h3><p className="text-sm text-slate-400 mt-1">캠페인에 필요한 매체 규격을 선택해주세요.</p></div>
                  <button onClick={() => setIsAddAssetModalOpen(false)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-400 hover:text-white"><X size={20} /></button>
                </div>
                <div className="p-8 bg-[#0a0812]">
                  <div className="grid grid-cols-2 lg:grid-cols-3 gap-5">
                    {BANNER_SPECS.map((spec) => (
                      <div key={spec.type} onClick={() => addAsset(spec.type, spec.name)} className="bg-[#1a1c26] border border-[#303340] rounded-xl p-5 cursor-pointer hover:border-[#7387ff] hover:-translate-y-1 transition-all group flex flex-col h-full">
                        <div className="flex items-start justify-between mb-4"><div className="p-3 bg-[#262833] rounded-xl text-[#7387ff] group-hover:bg-[#7387ff] group-hover:text-white"><spec.icon size={24} /></div><span className="text-[10px] font-bold font-mono bg-slate-800 text-slate-300 px-2 py-1 rounded-md">{spec.ratio}</span></div>
                        <h4 className="text-lg font-bold text-white mb-2 group-hover:text-[#7387ff]">{spec.name}</h4>
                        <div className="flex flex-wrap gap-2 mb-4"><span className="text-[11px] font-mono bg-[#0a0812] border border-[#303340] text-slate-300 px-2 py-1 rounded-md">{spec.size}</span></div>
                        <p className="text-xs text-slate-400 leading-relaxed mt-auto border-t border-[#262833] pt-4">{spec.desc}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 2-2. === MODALS: Jira 전송 워크플로우 가이드 === */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-[#12141c] w-[650px] border border-[#262833] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-5 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]">
                  <h3 className="text-base font-extrabold text-white flex items-center gap-2">
                    <Send size={20} className="text-[#4f3df6]" /> Jira 다중 일감 전송 대기 중
                  </h3>
                  <button onClick={() => setModalState({ isOpen: false, step: 0, payloads: [] })} className="p-1.5 hover:bg-slate-800 rounded-full text-slate-500 hover:text-white transition-colors"><X size={18}/></button>
                </div>
                
                <div className="p-8">
                  {/* Step 1: 데이터 패킹 완료 (성공 메시지) */}
                  <div className="mb-8 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl">
                    <h4 className="text-blue-400 font-bold text-sm mb-1.5 flex items-center gap-2">
                      <CheckCircle size={16}/> 1단계: 기획 데이터 패킹 완료
                    </h4>
                    <p className="text-xs text-slate-300 leading-relaxed pl-6">
                      총 <strong className="text-white">{modalState.payloads.length}건</strong>의 배너 기획 데이터가 확장 프로그램으로 전송될 준비를 마쳤습니다.<br/>
                      실제 지라(Jira) 티켓 생성을 위해 아래 절차를 진행해 주세요.
                    </p>
                  </div>

                  {/* Step 2 & 3: 워크플로우 안내 */}
                  <div className="space-y-6 relative">
                    <div className="flex gap-4 items-start">
                        <div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-slate-300 font-bold shrink-0 mt-0.5 border border-[#303340]">2</div>
                        <div>
                            <h4 className="text-sm font-bold text-white mb-1.5">Jira BTVEVT 프로젝트 열기</h4>
                            <p className="text-xs text-slate-400 mb-3">티켓을 일괄 생성할 타겟 Jira 프로젝트 페이지를 엽니다.</p>
                            {/* 사내망 주소 예시 */}
                            <a href="#" target="_blank" rel="noreferrer" className="inline-flex items-center gap-1.5 text-xs bg-[#1a1c26] hover:bg-[#262833] text-white px-4 py-2 rounded-lg border border-[#303340] transition-colors shadow-sm">
                                <ExternalLink size={14} className="text-[#7387ff]"/> BTVEVT 보드 열기
                            </a>
                        </div>
                    </div>
                    
                    <div className="absolute left-4 top-10 bottom-12 w-px bg-[#262833]"></div>

                    <div className="flex gap-4 items-start">
                        <div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-slate-300 font-bold shrink-0 mt-0.5 border border-[#303340]">3</div>
                        <div className="w-full">
                            <h4 className="text-sm font-bold text-white mb-1.5">확장 프로그램 매크로 실행</h4>
                            <p className="text-xs text-slate-400 mb-3">열린 Jira 화면에서 설치된 <strong className="text-slate-200">'B tv Campaign 매크로'</strong> 아이콘을 클릭하면 티켓이 순차적으로 자동 생성됩니다.</p>
                            
                            <div className="bg-[#06070a] border border-[#262833] rounded-lg p-3 flex items-center justify-between shadow-inner">
                                <span className="text-[11px] text-slate-500 font-mono">생성 대기 중인 페이로드: {modalState.payloads.length} items</span>
                                <button onClick={copyToClipboard} className="text-xs flex items-center gap-1 text-[#7387ff] hover:text-white transition-colors bg-[#7387ff]/10 px-2 py-1 rounded">
                                    <Copy size={12}/> 마크다운 수동 복사
                                </button>
                            </div>
                        </div>
                    </div>
                  </div>
                </div>

                <div className="p-5 bg-[#0f111a] border-t border-[#262833] flex justify-end">
                  <button onClick={() => setModalState({ isOpen: false, step: 0, payloads: [] })} className="px-8 py-2.5 bg-[#262833] hover:bg-[#303340] text-white text-sm font-bold rounded-lg transition-colors">
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
