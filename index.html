<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // CDN을 통해 React와 필수 아이콘들을 브라우저로 직접 불러옵니다.
    import React, { useState } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Smile, Settings, Calendar, GitMerge, Plus, Trash2, Image as ImageIcon,
      ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, ArrowRight, X
    } from 'https://esm.sh/lucide-react@0.292.0?external=react';

    // --- Specifications & Templates ---
    const BANNER_SPECS = [
      { type: 'TODAY_BTV', name: 'Today B tv', icon: MonitorPlay, ratio: '16:9', size: '3840 x 2160', max: 'Max 4MB', desc: '홈 화면 최상단 대형 롤링 배너. 텍스트/인물 안전영역 준수 필수.' },
      { type: 'BANNER_2_COL', name: '2단 배너', icon: ImageIcon, ratio: '16:9', size: '1920 x 1080', max: 'Max 2MB', desc: '주요 메뉴 하단에 노출되는 범용적인 가로형 배너.' },
      { type: 'BANNER_1_COL', name: '1단 배너', icon: LayoutPanelLeft, ratio: '3:4', size: '1080 x 1440', max: 'Max 2MB', desc: '포스터 비율의 세로형 배너. 콘텐츠 강조에 적합.' },
      { type: 'LONG_BANNER', name: '롱배너', icon: Smartphone, ratio: '1:2', size: '800 x 1600', max: 'Max 3MB', desc: '세로로 길게 노출되는 배너. 카피 가독성이 매우 중요함.' },
      { type: 'BAND_BANNER', name: '띠배너', icon: ImageIcon, ratio: '8:1', size: '3840 x 480', max: 'Max 2MB', desc: '콘텐츠 블록 사이에 삽입되는 얇고 긴 형태의 프로모션 배너.' },
    ];

    const DEFAULT_TODAY_BTV = {
      topText: 'Disney+',
      mainTitle: 'B tv에선 디즈니+\n매월 10% 할인!',
      subText: '지금 10%할인 쿠폰받고\n디즈니+의 최신 콘텐츠를 감상하세요',
      landingValue: '쿠폰 다운로드',
      imageUrl: '',
    };

    const DEFAULT_BANNER = {
      copy: '지금 10%할인 쿠폰받고\n디즈니+의 최신 콘텐츠를 감상하세요',
      landingValue: '가입 유도 랜딩 (UI_PATH: /join)',
      imageUrl: '',
    };

    function App() {
      // --- 0. App View State ---
      const [appView, setAppView] = useState('CAMPAIGN_MANAGER'); 
      
      // --- 1. Global Campaign State ---
      const [campaignMeta, setCampaignMeta] = useState({
        campaignName: '디즈니플러스 런칭 프로모션',
        target: '5.5.2 이상 MASS',
        toneAndManner: '‘메이드인코리아’ 타이틀 이미지 중심 활용',
        assignee: '정은샘',
        epicLink: 'BTVEVT-8000',
        fixVersion: '23년_12월_3주차_정기배포',
        startDate: '2023-12-18',
        dueDate: '2023-12-31',
      });

      // --- 2. Dynamic Assets State ---
      const [assets, setAssets] = useState([
        { id: 'asset-1', type: 'TODAY_BTV', name: 'Today B tv', data: { ...DEFAULT_TODAY_BTV } },
        { id: 'asset-2', type: 'BANNER_2_COL', name: 'OTT홈 2단 배너', data: { ...DEFAULT_BANNER, copy: 'B tv에선 Disney+ 매월 10% 할인!' } }
      ]);

      // --- 3. UI States ---
      const [activeTabId, setActiveTabId] = useState('OVERVIEW');
      const [showSafeZone, setShowSafeZone] = useState(true);
      const [isAddAssetModalOpen, setIsAddAssetModalOpen] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, step: 0, payloads: [] });

      // --- Handlers ---
      const handleMetaChange = (e) => setCampaignMeta({ ...campaignMeta, [e.target.name]: e.target.value });
      
      const handleAssetChange = (id, field, value) => {
        setAssets(assets.map(asset => {
          if (asset.id === id) {
            return { ...asset, data: { ...asset.data, [field]: value } };
          }
          return asset;
        }));
      };

      const addAsset = (type, name) => {
        const newId = `asset-${Date.now()}`;
        const newData = type === 'TODAY_BTV' ? { ...DEFAULT_TODAY_BTV } : { ...DEFAULT_BANNER };

        setAssets([...assets, { id: newId, type, name, data: newData }]);
        setActiveTabId(newId);
        setIsAddAssetModalOpen(false);
      };

      const removeAsset = (id, e) => {
        e.stopPropagation();
        if (assets.length === 1) return alert('최소 1개의 제작물은 필요합니다.');
        const newAssets = assets.filter(a => a.id !== id);
        setAssets(newAssets);
        if (activeTabId === id) setActiveTabId('OVERVIEW');
      };

      // --- Payload Generator ---
      const generateBatchPayloads = () => {
        return assets.map(asset => {
          const issueTitle = `[디자인요청] ${campaignMeta.campaignName} - ${asset.name}`;
          
          let markdown = `h3. 📌 캠페인 공통 정보\n|| 항목 || 내용 ||\n| *캠페인명* | ${campaignMeta.campaignName} |\n| *편성 일정* | ${campaignMeta.startDate} ~ ${campaignMeta.dueDate} |\n| *타겟/톤앤매너* | ${campaignMeta.target} / ${campaignMeta.toneAndManner} |\n\n---\n\n`;
          markdown += `h3. 🖼️ ${asset.name} 상세 기획\n`;
          
          if (asset.type === 'TODAY_BTV') {
            markdown += `* *상단 텍스트:* ${asset.data.topText}\n* *메인 타이틀:* ${asset.data.mainTitle.replace(/\n/g, ' ')}\n* *서브 텍스트:* ${asset.data.subText.replace(/\n/g, ' ')}\n* *랜딩값:* ${asset.data.landingValue}\n`;
          } else {
            markdown += `* *메인 카피:* ${asset.data.copy.replace(/\n/g, ' ')}\n* *랜딩값:* ${asset.data.landingValue}\n`;
          }

          return {
            action: "CREATE_JIRA_ISSUE",
            data: {
              issueTitle,
              epicLink: campaignMeta.epicLink,
              fixVersion: campaignMeta.fixVersion,
              startDate: campaignMeta.startDate,
              dueDate: campaignMeta.dueDate,
              assignee: campaignMeta.assignee,
              description: markdown
            }
          };
        });
      };

      const handleExportToExtension = () => {
        if (assets.length === 0) return alert('제작물이 없습니다.');
        const payloads = generateBatchPayloads();
        setModalState({ isOpen: true, step: 1, payloads });
        setTimeout(() => setModalState(prev => ({ ...prev, step: 2 })), 1500);
        setTimeout(() => setModalState(prev => ({ ...prev, step: 3 })), 3500);
      };

      const copyToClipboard = () => {
        const fullText = modalState.payloads.map(p => `[${p.data.issueTitle}]\n${p.data.description}`).join('\n\n====================\n\n');
        navigator.clipboard.writeText(fullText);
        alert('전체 마크다운이 클립보드에 복사되었습니다.');
      };

      // --- Render Utilities ---
      const activeAsset = assets.find(a => a.id === activeTabId);

      const getAssetIcon = (type) => {
        const spec = BANNER_SPECS.find(s => s.type === type);
        const IconComponent = spec ? spec.icon : ImageIcon;
        return <IconComponent size={16} />;
      };

      const getPreviewClasses = (type) => {
        switch(type) {
          case 'BANNER_1_COL': return 'aspect-[3/4] w-[300px] max-w-full'; 
          case 'BANNER_2_COL': return 'aspect-[16/9] w-[500px] max-w-full'; 
          case 'LONG_BANNER': return 'aspect-[1/2] w-[240px] max-w-full'; 
          case 'BAND_BANNER': return 'aspect-[8/1] w-[800px] max-w-full'; 
          default: return 'aspect-[16/9] w-[500px] max-w-full';
        }
      };

      return (
        <div className="flex h-screen w-full bg-[#0a0812] text-slate-200 font-sans overflow-hidden">
          
          {/* --- GLOBAL THIN NAVIGATION BAR --- */}
          <nav className="w-[72px] flex-shrink-0 bg-[#0f111a] border-r border-[#262833] flex flex-col items-center py-6 z-30">
            <div className="w-11 h-11 bg-gradient-to-br from-[#7387ff] to-[#4631e6] rounded-xl flex items-center justify-center mb-8 shadow-lg shadow-[#7387ff]/20">
              <Tv className="text-white" size={24} />
            </div>
            <div className="flex flex-col gap-4 w-full px-3">
              <button 
                onClick={() => setAppView('AI_COPILOT')}
                className={`w-full aspect-square rounded-xl flex flex-col items-center justify-center transition-all ${appView === 'AI_COPILOT' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-slate-300 hover:bg-[#1e2029]'}`}
                title="AI 코파일럿"
              >
                <Bot size={24} />
              </button>
              <button 
                onClick={() => setAppView('CAMPAIGN_MANAGER')}
                className={`w-full aspect-square rounded-xl flex flex-col items-center justify-center transition-all ${appView === 'CAMPAIGN_MANAGER' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-slate-300 hover:bg-[#1e2029]'}`}
                title="캠페인 매니저"
              >
                <LayoutTemplate size={24} />
              </button>
            </div>
            <div className="mt-auto w-full px-3">
              <button className="w-full aspect-square rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 hover:bg-[#1e2029] transition-all">
                <Settings size={24} />
              </button>
            </div>
          </nav>

          {/* --- VIEW 1: AI COPILOT --- */}
          {appView === 'AI_COPILOT' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-[#0a0812]">
               <div className="text-center space-y-4">
                 <Bot size={64} className="mx-auto text-slate-700" />
                 <h2 className="text-2xl font-bold text-slate-400">AI 기획 기능은 현재 준비 중입니다.</h2>
                 <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className="px-6 py-2 bg-[#7387ff] hover:bg-[#5b6dbf] rounded-lg font-bold text-white mt-4 transition-colors">캠페인 매니저로 이동</button>
               </div>
            </div>
          )}

          {/* --- VIEW 2: CAMPAIGN MANAGER --- */}
          {appView === 'CAMPAIGN_MANAGER' && (
            <>
              {/* === LEFT SIDEBAR: Global Campaign Meta === */}
              <aside className="w-[340px] flex-shrink-0 bg-[#12141c] border-r border-[#262833] flex flex-col h-full z-10">
                <div className="p-6 border-b border-[#262833] bg-[#0f111a]">
                  <h1 className="text-xl font-extrabold text-white flex items-center gap-2 tracking-tight">
                    B tv Campaign
                  </h1>
                  <p className="text-[11px] text-slate-400 mt-1.5 font-medium">에픽/릴리스 기반 다중 배너 기획</p>
                </div>

                <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar relative">
                  
                  {/* Jira 다중 일감 전송 버튼 */}
                  <div className="sticky top-0 z-10 bg-[#12141c] pb-4">
                    <button 
                      onClick={handleExportToExtension}
                      className="w-full bg-gradient-to-r from-[#4f3df6] to-[#7387ff] hover:from-[#3a2ac4] hover:to-[#5b6dbf] text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-[0_4px_15px_rgba(79,61,246,0.3)] transition-transform transform hover:-translate-y-0.5"
                    >
                      <Send size={16} /> Jira 다중 일감 전송 
                      <span className="bg-white/20 px-2 py-0.5 rounded-md text-xs ml-1 backdrop-blur-sm">{assets.length}건</span>
                    </button>
                    <p className="text-[10px] text-slate-500 mt-2 text-center">우측에서 작성한 모든 배너 기획안이 전송됩니다.</p>
                  </div>

                  {/* Section 1: Common Meta */}
                  <div>
                    <h2 className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-1.5">
                      <LayoutTemplate size={14} className="text-slate-400"/> 캠페인 공통 정보
                    </h2>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-300 mb-1.5">프로젝트(캠페인)명</label>
                        <input type="text" name="campaignName" value={campaignMeta.campaignName} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-300 mb-1.5">타겟 대상</label>
                        <input type="text" name="target" value={campaignMeta.target} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-300 mb-1.5">톤앤매너 (디자인 방향)</label>
                        <input type="text" name="toneAndManner" value={campaignMeta.toneAndManner} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2.5 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                      </div>
                    </div>
                  </div>

                  {/* Section 2: Jira Scheduling Fields */}
                  <div className="pt-2">
                    <h2 className="text-[11px] font-bold text-[#7387ff] uppercase tracking-widest mb-4 flex items-center gap-1.5">
                      <Calendar size={14}/> Jira 릴리스 및 담당자
                    </h2>
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[11px] font-bold text-slate-300 mb-1.5">상위 에픽</label>
                          <div className="flex items-center bg-[#1a1c26] border border-[#303340] rounded-lg px-2.5 py-2 shadow-sm focus-within:border-[#7387ff] focus-within:ring-1 focus-within:ring-[#7387ff]/50 transition-all">
                            <GitMerge size={14} className="text-slate-500 mr-2"/>
                            <input type="text" name="epicLink" value={campaignMeta.epicLink} onChange={handleMetaChange} className="w-full bg-transparent text-sm text-white outline-none font-mono" />
                          </div>
                        </div>
                        <div>
                          <label className="block text-[11px] font-bold text-slate-300 mb-1.5">릴리스(Fix)</label>
                          <input type="text" name="fixVersion" value={campaignMeta.fixVersion} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-sm text-white focus:border-[#7387ff] focus:ring-1 focus:ring-[#7387ff]/50 outline-none transition-all shadow-sm" />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-3 bg-[#0a0812] p-4 rounded-xl border border-[#262833]">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">시작일 (Start)</label>
                          <input type="date" name="startDate" value={campaignMeta.startDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert outline-none focus:border-[#7387ff]" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">종료일 (Due)</label>
                          <input type="date" name="dueDate" value={campaignMeta.dueDate} onChange={handleMetaChange} className="w-full bg-[#1a1c26] border border-[#303340] rounded-lg p-2 text-xs text-white [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert outline-none focus:border-[#7387ff]" />
                        </div>
                      </div>

                      <div>
                        <label className="block text-[11px] font-bold text-slate-300 mb-1.5">지정 담당자 (Assignee)</label>
                        <div className="flex items-center gap-3 bg-[#1a1c26] border border-[#303340] rounded-lg p-2 shadow-sm focus-within:border-[#7387ff] focus-within:ring-1 focus-within:ring-[#7387ff]/50 transition-all">
                          <div className="w-7 h-7 rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">
                            {campaignMeta.assignee.charAt(0)}
                          </div>
                          <input type="text" name="assignee" value={campaignMeta.assignee} onChange={handleMetaChange} className="bg-transparent text-sm text-white outline-none flex-1" />
                        </div>
                      </div>
                    </div>
                  </div>

                </div>
              </aside>

              {/* === RIGHT MAIN AREA === */}
              <main className="flex-1 flex flex-col min-w-0 bg-[#06070a] relative">
                
                {/* Dynamic Tabs Header */}
                <header className="bg-[#12141c]/90 backdrop-blur z-20 sticky top-0 flex flex-col shadow-sm">
                  <div className="flex justify-between items-end px-6 pt-4 border-b border-[#262833]">
                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar">
                      {/* Overview Tab */}
                      <div 
                        onClick={() => setActiveTabId('OVERVIEW')}
                        className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === 'OVERVIEW' ? 'bg-[#1e202c] text-[#7387ff] border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-slate-200 hover:bg-[#1a1c26]'}`}
                      >
                        <ListTodo size={16}/>
                        <span>전체 배너 관리</span>
                      </div>
                      
                      {/* Asset Tabs */}
                      {assets.map(asset => (
                        <div 
                          key={asset.id}
                          onClick={() => setActiveTabId(asset.id)}
                          className={`group flex items-center gap-2 px-5 py-3 text-sm font-bold rounded-t-xl transition-all cursor-pointer border-b-2 ${activeTabId === asset.id ? 'bg-[#1e202c] text-white border-[#7387ff]' : 'text-slate-400 border-transparent hover:text-slate-200 hover:bg-[#1a1c26]'}`}
                        >
                          <span className={activeTabId === asset.id ? 'text-[#7387ff]' : 'text-slate-500'}>{getAssetIcon(asset.type)}</span>
                          <span>{asset.name}</span>
                          <button 
                            onClick={(e) => removeAsset(asset.id, e)} 
                            className="opacity-0 group-hover:opacity-100 p-1 bg-transparent hover:bg-slate-700/50 rounded-full text-slate-400 hover:text-red-400 ml-2 transition-all"
                          >
                            <Trash2 size={14}/>
                          </button>
                        </div>
                      ))}

                      {/* Add Asset Button (Opens Modal now) */}
                      <div className="pb-2 ml-2 flex-shrink-0">
                        <button 
                          onClick={() => setIsAddAssetModalOpen(true)} 
                          className="flex items-center gap-1.5 px-4 py-2 bg-[#1a1c26] hover:bg-[#262833] text-slate-300 rounded-lg text-xs font-bold border border-[#303340] transition-colors shadow-sm hover:shadow-md"
                        >
                          <Plus size={16}/> 배너 슬롯 추가
                        </button>
                      </div>
                    </div>
                  </div>
                </header>

                {/* Workspace Area */}
                <div className="flex-1 overflow-y-auto relative custom-scrollbar">
                  
                  {/* TAB: OVERVIEW */}
                  {activeTabId === 'OVERVIEW' && (
                    <div className="p-8 max-w-5xl mx-auto animate-in fade-in duration-300">
                      <div className="bg-[#12141c] border border-[#262833] rounded-2xl overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-[#262833] bg-[#0f111a] flex justify-between items-center">
                          <div>
                            <h3 className="text-base font-bold text-white flex items-center gap-2"><ListTodo size={18} className="text-[#7387ff]" /> 생성 예정 티켓 (Sub-tasks)</h3>
                            <p className="text-xs text-slate-400 mt-1.5">좌측 메뉴에서 전송 시 아래 리스트가 개별 Jira 티켓으로 생성되며, 에픽({campaignMeta.epicLink})에 묶입니다.</p>
                          </div>
                          <div className="bg-[#1a1c26] px-3 py-1.5 rounded-lg border border-[#303340] text-xs font-bold text-slate-300">
                            총 <span className="text-[#7387ff] text-sm mx-1">{assets.length}</span>개의 제작물
                          </div>
                        </div>
                        {assets.length === 0 ? (
                          <div className="p-16 flex flex-col items-center justify-center text-slate-500">
                            <ImageIcon size={48} className="mb-4 opacity-20" />
                            <p className="font-bold text-lg text-slate-400">등록된 배너가 없습니다.</p>
                            <button onClick={() => setIsAddAssetModalOpen(true)} className="mt-4 text-[#7387ff] hover:underline flex items-center gap-1"><Plus size={14}/>새 배너 슬롯 추가하기</button>
                          </div>
                        ) : (
                          <table className="w-full text-left border-collapse">
                            <thead>

                        {modalState.step === 3 ? '완료 및 닫기' : '취소'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
