<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B tv Campaign Manager Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0a0812; font-family: 'Pretendard', -apple-system, sans-serif; color: #cbd5e1; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #44464f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Tv, LayoutTemplate, Send, ChevronRight, Copy, CheckCircle, 
      Search, Mic, Menu, Home, Grid, Smile, Settings, Calendar, GitMerge, Plus, Trash2, Image as ImageIcon,
      ListTodo, Smartphone, LayoutPanelLeft, MonitorPlay, Sparkles, Bot, ArrowRight, X, Target, Edit3, User, ExternalLink,
      Save, GripVertical, GripHorizontal, RefreshCw, ChevronDown, Layout, Video, Star, FileText, Download, ArrowRightLeft,
      Inbox, RotateCcw, Clock, ChevronLeft, Film, PlayCircle, BookOpen, MessageSquare, Ban, Eye, EyeOff, Database, Layers,
      Hash, AlertTriangle, Link, MousePointer, MousePointerClick, Tag, PlusCircle, MoreHorizontal, StickyNote, Upload, Link2,
      Box, Filter, History, Rewind, MoreVertical, Minus, Users, Check, XCircle, ArrowRightCircle
    } from 'lucide-react';

    // ==========================================
    // [설정] Mock Data Mode
    // ==========================================
    const USE_MOCK_DATA = true;

    // --- Mock Data ---
    const INITIAL_GNB_TREE = [
        { id: '1', name: '홈', slug: 'home', children: [] },
        { 
            id: '2', name: '영화', slug: 'movie', children: [
                { id: '2-1', name: '추천 영화', slug: 'rec-movie' },
                { id: '2-2', name: '신작', slug: 'new-movie' },
                { id: 'div-1', name: '---', slug: 'div-1' }, 
                { id: '2-3', name: '장르별', slug: 'genre-movie' }
            ] 
        }
    ];

    const MOCK_BLOCKS = [
      {
        id: 'b1', type: 'TODAY_BTV', title: 'Today B tv', blockId: 'TD_001', showTitle: true,
        items: [
          { id: 'tb1', type: 'BANNER', title: '원작의 느낌 그대로.\n리메이크 콘텐츠 특집', desc: '지금 가입하고 디즈니+의\n최신 콘텐츠를 감상하세요', img: '', isTarget: true, topText: '디즈니+ 런칭' },
          { id: 'tb2', type: 'BANNER', title: '눈물의 여왕', desc: 'tvN 토일드라마', img: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000&auto=format&fit=crop' }
        ]
      },
      {
        id: 'b2', type: 'BANNER_3', title: '3단 와이드 배너 영역', blockId: 'B3_001', showTitle: true,
        banners: [
          { id: 'b3-1', title: '주요 이벤트 안내', copy: '봄맞이 50% 할인\n특별 프로모션', subCopy: '자세한 내용을 확인하세요', img: '봄이벤트' },
          { id: 'b3-2', title: '신작 영화', copy: '이번 주말엔\n이 영화 어때요?', img: '영화포스터' }
        ]
      },
      {
        id: 'b3', type: 'BANNER_2', title: '2단 배너 영역', blockId: 'B2_001', showTitle: true,
        banners: [
          { id: 'b2-1', title: '이달의 추천작', copy: '놓치면 후회할 대작', subCopy: 'B tv 독점 공개', img: '', isTarget: true },
          { id: 'b2-2', title: '키즈 특관', copy: '우리아이 맞춤형 콘텐츠', img: '' }
        ]
      },
      {
        id: 'b4', type: 'BANNER_1', title: '1단 세로 배너', blockId: 'B1_001', showTitle: true,
        banners: [
          { id: 'b1-1', title: '인물 중심 배너', copy: '일이삼사오육칠팔\n구십일이삼사오', subCopy: '빛과 그림자', img: '배우프로필' }
        ]
      }
    ];

    const MOCK_HISTORY_DATA = { '2026-04-01': [{ id: 'h-1', type: 'TODAY_BTV', title: '과거 데이터', items: [{ title: '만우절 특집' }] }] };
    const MOCK_REQUESTS = [
      { id: 'r1', requester: '김편성', team: '편성1팀', title: '신규 영화 블록 추가 요청', desc: '이번 주 신작 영화 소개를 위한 블록 추가', type: 'BANNER_2', gnb: '영화 > 신작', status: 'PENDING', location: '상단', remarks: '급함', createdAt: '2026-04-08' },
      { id: 'r-pub-1', requester: '관리자', team: '운영팀', title: '[편성반영] 정기 개편', desc: '개편 반영 요청', type: 'PUBLISH', gnb: '홈', status: 'PENDING', location: '전체', createdAt: '2026-04-09', snapshot: JSON.parse(JSON.stringify(MOCK_BLOCKS)) }
    ];

    const generateSlug = (name) => `menu-${Date.now()}`;

    // --- State Hook (원복) ---
    const useBtvData = (viewMode) => {
        const [gnbList, setGnbList] = useState(INITIAL_GNB_TREE);
        const [expandedMenuIds, setExpandedMenuIds] = useState(['2']); 
        const [currentMenuPath, setCurrentMenuPath] = useState('홈');
        const [currentMenuId, setCurrentMenuId] = useState('1');
        const [blocks, setBlocks] = useState(JSON.parse(JSON.stringify(MOCK_BLOCKS)));
        const [originalBlocks, setOriginalBlocks] = useState(JSON.parse(JSON.stringify(MOCK_BLOCKS))); 
        const [requests, setRequests] = useState([...MOCK_REQUESTS]);

        const toggleExpand = (id) => setExpandedMenuIds(prev => prev.includes(id) ? prev.filter(eid => eid !== id) : [...prev, id]);

        const handleMenuChange = (id, path, isLeaf = true) => {
            if (!isLeaf) { toggleExpand(id); return; }
            setCurrentMenuId(id); setCurrentMenuPath(path);
            const newBlocks = id === '1' ? [...MOCK_BLOCKS] : [...MOCK_BLOCKS].sort(() => 0.5 - Math.random()).slice(0,2);
            setBlocks(JSON.parse(JSON.stringify(newBlocks)));
            setOriginalBlocks(JSON.parse(JSON.stringify(newBlocks)));
        };

        const moveBlock = (index, direction) => {
            if (viewMode === 'HISTORY') return; 
            const newBlocks = [...blocks];
            if (direction === 'UP' && index > 0) [newBlocks[index - 1], newBlocks[index]] = [newBlocks[index], newBlocks[index - 1]];
            else if (direction === 'DOWN' && index < newBlocks.length - 1) [newBlocks[index], newBlocks[index + 1]] = [newBlocks[index + 1], newBlocks[index]];
            setBlocks(newBlocks);
        };

        const addGnb = (name) => { const newGnb = { id: `gnb-${Date.now()}`, name, slug: generateSlug(name), children: [] }; setGnbList(prev => [...prev, newGnb]); };
        const addSubMenu = (parentId, name) => {
            setGnbList(prev => prev.map(item => item.id === parentId ? { ...item, children: [...(item.children || []), { id: `sub-${Date.now()}`, name, slug: generateSlug(name) }] } : item));
            if (!expandedMenuIds.includes(parentId)) setExpandedMenuIds([...expandedMenuIds, parentId]);
        };
        const deleteGnb = (id) => { setGnbList(prev => prev.filter(item => item.id !== id)); if (currentMenuId === id) setCurrentMenuId(null); };
        const deleteSubMenu = (parentId, childId) => { setGnbList(prev => prev.map(item => item.id === parentId ? { ...item, children: item.children.filter(c => c.id !== childId) } : item)); };

        return { gnbList, currentMenuPath, currentMenuId, expandedMenuIds, blocks, setBlocks, originalBlocks, requests, setRequests, handleMenuChange, toggleExpand, addGnb, addSubMenu, deleteGnb, deleteSubMenu, moveBlock };
    };

    // --- BlockRenderer (배너 프리뷰 코어) ---
    const BlockRenderer = ({ block, isOriginal, onUpdate, onEditBannerId, readOnly = false, onMoveUp, onMoveDown, isFirst, isLast }) => {
      const [previewIndex, setPreviewIndex] = useState(0);
      const [localShowSafeZone, setLocalShowSafeZone] = useState(true);
      
      const hasMainPreview = ['TODAY_BTV', 'BIG_BANNER', 'BANNER_1', 'BANNER_2', 'BANNER_3'].includes(block.type);
      const itemsToRender = block.type === 'TODAY_BTV' ? (block.items || []) : (block.banners || []);
      const currentItem = itemsToRender[previewIndex] || {};
      
      const isActualUrl = Boolean(currentItem.img && typeof currentItem.img === 'string' && currentItem.img.startsWith('http'));
      const hasImageText = Boolean(currentItem.img && !isActualUrl && currentItem.img.trim() !== '');

      const getPreviewClasses = (type) => {
        switch(type) {
          case 'BANNER_1': return 'aspect-[3/4] w-[300px]'; 
          case 'BANNER_2': return 'aspect-[16/9] w-[600px]'; 
          case 'BANNER_3': return 'aspect-[3/1] w-[850px]'; 
          default: return 'aspect-[16/9] w-[600px]';
        }
      };

      return (
        <div className={`p-5 rounded-2xl border border-[#2e3038] bg-[#12141c] relative transition-all ${isOriginal ? 'opacity-60 grayscale' : ''}`}>
          {/* 블록 이동 컨트롤러 */}
          {!readOnly && !isOriginal && (
             <div className="absolute -top-3 left-0 right-0 h-6 flex justify-center items-center z-20 opacity-0 hover:opacity-100 transition-opacity">
                 <div className="flex items-center gap-1 bg-[#161820] border border-slate-600 rounded-full px-2 py-0.5 shadow-md">
                     <button onClick={onMoveUp} disabled={isFirst} className={`p-1 hover:text-white rounded-full ${isFirst ? 'text-slate-600' : 'text-slate-400'}`}><ChevronDown size={12} className="rotate-180"/></button>
                     <div className="w-px h-3 bg-slate-600 mx-1"></div>
                     <button onClick={onMoveDown} disabled={isLast} className={`p-1 hover:text-white rounded-full ${isLast ? 'text-slate-600' : 'text-slate-400'}`}><ChevronDown size={12} /></button>
                 </div>
             </div>
          )}

          {/* 블록 헤더 */}
          <div className="flex justify-between items-center mb-4">
            <div className="flex items-center gap-3">
              <h3 className="text-base font-bold text-white flex items-center gap-2">{block.title}</h3>
              <span className="text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded font-mono">{block.blockId}</span>
              {hasMainPreview && (
                <button onClick={() => setLocalShowSafeZone(!localShowSafeZone)} className={`px-2 py-1 text-[10px] rounded border transition-colors ${localShowSafeZone ? 'bg-[#7387ff] text-white border-[#7387ff]' : 'bg-transparent text-slate-500 border-slate-600 hover:text-white'}`}>
                  가이드라인 {localShowSafeZone ? 'ON' : 'OFF'}
                </button>
              )}
            </div>
            <span className="text-[10px] border border-slate-700 bg-slate-800 text-slate-400 px-2 py-1 rounded">{block.type}</span>
          </div>

          {/* 메인 캔버스 프리뷰 영역 */}
          {hasMainPreview && (
            <div className="flex justify-center mb-6 relative">
              {block.type === 'TODAY_BTV' ? (
                /* --- Today B tv Mockup --- */
                <div className="relative w-full aspect-[16/9] max-w-[900px] bg-[#0a0a0f] rounded-2xl overflow-hidden border-[6px] border-[#1a1a1a] shadow-2xl">
                  {/* 배경 및 이미지 처리 */}
                  <div className="absolute inset-0 bg-[#0a0a0f]"></div>
                  <div className="absolute inset-0 bg-no-repeat bg-right-top" style={{ backgroundImage: isActualUrl ? `url(${currentItem.img})` : 'none', backgroundSize: '75% 85%' }}>
                    {hasImageText && <div className="ml-[35%] h-full flex items-center justify-center text-white/10 text-[5rem] font-black italic select-none">{currentItem.img}</div>}
                    {!isActualUrl && !hasImageText && <div className="absolute inset-0 bg-gradient-to-bl from-[#1e1b4b] to-[#0a0a0f] opacity-50"></div>}
                  </div>
                  
                  {/* 그라데이션 블렌딩 */}
                  <div className="absolute inset-0 w-[60%] bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/90 to-transparent z-10 pointer-events-none"></div>
                  <div className="absolute inset-0 top-[50%] bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f]/80 to-transparent z-10 pointer-events-none"></div>
                  
                  {/* TV UI 요소 */}
                  <div className="absolute inset-0 z-20 flex flex-col pointer-events-none text-white">
                    <div className="absolute left-0 top-0 bottom-0 w-[70px] flex flex-col items-center pt-10 pb-6 gap-6 opacity-50 border-r border-white/5"><Menu size={18}/><Tv size={18}/><Home size={22} className="opacity-100 text-white drop-shadow-md"/><Grid size={18}/><Settings size={18} className="mt-auto"/></div>
                    <div className="absolute left-[90px] top-[40%] -translate-y-1/4 w-[40%]">
                      <h3 className="text-[#32d782] text-sm font-bold mb-2 tracking-tight">{currentItem.topText || '상단 카피'}</h3>
                      <h1 className="text-white text-3xl font-black mb-3 leading-[1.15] whitespace-pre-wrap tracking-tighter">{currentItem.title || '메인 문구를 입력하세요'}</h1>
                      <p className="text-slate-300 text-xs font-medium leading-relaxed whitespace-pre-wrap">{currentItem.desc || '서브 텍스트 영역입니다.'}</p>
                      <div className="mt-5 inline-flex bg-[#4631e6] text-white px-5 py-2 rounded font-bold text-xs shadow-lg">자세히 보기</div>
                    </div>
                  </div>

                  {/* 안전 영역 가이드 */}
                  {localShowSafeZone && (
                    <div className="absolute inset-0 z-30 pointer-events-none opacity-60">
                      <div className="absolute left-[50%] top-0 bottom-0 w-px border-l-[1.5px] border-dashed border-white/60"></div>
                      <div className="absolute top-[45%] left-0 right-0 h-px border-t-[1.5px] border-dashed border-white/60"></div>
                      <div className="absolute right-[4%] top-[15%] bottom-[28%] left-[53%] bg-[#00bcd4]/20 border border-[#00bcd4]/60 flex items-center justify-center"><span className="text-white font-black text-xl bg-black/50 px-3 py-1 rounded">이미지 안전 영역</span></div>
                      <div className="absolute left-[90px] top-[22%] bottom-[40%] w-[38%] bg-pink-500/10 border border-dashed border-pink-500/50 flex items-start p-2"><span className="text-pink-100 text-[9px] font-bold bg-pink-600/90 px-1.5 py-0.5 rounded">텍스트 최대 2줄</span></div>
                      <div className="absolute left-0 right-0 bottom-0 h-[28%] border-t-[1.5px] border-dashed border-orange-500 bg-orange-500/10 flex items-end justify-center pb-4"><span className="font-bold text-[10px] px-3 py-1 rounded bg-orange-600/90 text-white">하단 썸네일 침범 금지</span></div>
                    </div>
                  )}
                </div>
              ) : (
                /* --- 일반 배너 (1, 2, 3단) 분할 Mockup --- */
                <div className="relative group flex flex-col items-center">
                  <div className="mb-3 text-[#7387ff] text-[10px] font-bold px-3 py-1 bg-[#7387ff]/10 rounded-full border border-[#7387ff]/30">편성 위치: {block.data?.gnb || '영화 > 신작'}</div>
                  
                  {block.type === 'BANNER_1' ? (
                    /* 1단 배너 (세로형) */
                    <div className={`relative bg-[#191b23] rounded-xl overflow-hidden shadow-2xl border border-[#303340] flex flex-col ${getPreviewClasses(block.type)}`}>
                      <div className="p-6 pb-2 z-10 text-center">
                        <h4 className="text-slate-400 text-xs font-medium mb-1">{currentItem.subHeader || '상단 타이틀'}</h4>
                        <h2 className="text-white text-xl font-black leading-tight tracking-tighter whitespace-pre-wrap">{currentItem.copy || '메인 카피'}</h2>
                      </div>
                      <div className="flex-1 w-full bg-cover bg-center relative" style={{ backgroundImage: isActualUrl ? `url(${currentItem.img})` : 'none' }}>
                        {!isActualUrl && <div className="absolute inset-0 bg-gradient-to-t from-[#1e1b4b] to-[#191b23]"></div>}
                        {hasImageText && <div className="absolute inset-0 flex items-center justify-center text-white/10 text-2xl font-black italic select-none">{currentItem.img}</div>}
                      </div>
                    </div>
                  ) : (
                    /* 2단, 3단 배너 (가로 분할형) */
                    <div className={`relative bg-[#191b23] rounded-xl overflow-hidden shadow-2xl border border-[#303340] flex transition-all duration-300 ${getPreviewClasses(block.type)}`}>
                      <div className="absolute inset-0 bg-[#0a0a0f]"></div>
                      
                      {/* 우측 이미지 영역 (55%) */}
                      <div className="absolute right-0 top-0 bottom-0 w-[55%] bg-no-repeat bg-cover bg-center transition-all" style={{ backgroundImage: isActualUrl ? `url(${currentItem.img})` : 'none' }}>
                        {hasImageText && <div className="absolute inset-0 flex items-center justify-center text-white/10 text-4xl font-black select-none italic">{currentItem.img}</div>}
                        <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0f] via-[#0a0a0f]/40 to-transparent"></div>
                      </div>

                      {/* 좌측 문구 영역 (45%) */}
                      <div className="relative z-10 w-[60%] h-full flex flex-col justify-center items-start p-8 text-left gap-1">
                        <h4 className="text-slate-400 text-xs font-medium mb-1">{currentItem.subHeader || '빛과 그림자'}</h4>
                        <p className={`text-white font-extrabold whitespace-pre-wrap leading-[1.2] tracking-tighter ${block.type === 'BANNER_3' ? 'text-4xl' : 'text-2xl'}`}>
                          {currentItem.copy || '기획 문구를\n입력하세요'}
                        </p>
                        <p className="text-slate-500 text-[10px] mt-4 font-medium tracking-tight whitespace-pre-wrap">{currentItem.subCopy || '서브 카피 영역'}</p>
                      </div>
                    </div>
                  )}

                  {/* 안전 영역 가이드 (일반 배너용 텍스트/이미지 반갈죽 선) */}
                  {localShowSafeZone && block.type !== 'BANNER_1' && (
                    <div className="absolute inset-0 z-30 pointer-events-none mt-9">
                      <div className="absolute left-[45%] top-0 bottom-0 w-px border-l-[1.5px] border-dashed border-pink-500/50"></div>
                      <div className="absolute right-2 top-2 text-[9px] bg-pink-500/20 text-pink-300 px-1.5 py-0.5 rounded border border-pink-500/30">이미지 영역 (55%)</div>
                      <div className="absolute left-2 top-2 text-[9px] bg-blue-500/20 text-blue-300 px-1.5 py-0.5 rounded border border-blue-500/30">텍스트 영역 (45%)</div>
                    </div>
                  )}
                </div>
              </div>
            )}
          )}

          {/* 하단 썸네일 네비게이션 */}
          <div className="flex gap-3 overflow-x-auto pb-2 border-t border-[#2e3038] pt-4">
            {itemsToRender.map((item, idx) => (
              <div 
                key={idx} 
                onClick={(e) => { e.stopPropagation(); setPreviewIndex(idx); }}
                className={`flex-shrink-0 w-32 h-16 rounded-lg relative cursor-pointer transition-all border overflow-hidden ${idx === previewIndex ? 'ring-2 ring-[#7387ff] border-transparent scale-105' : 'border-slate-700 opacity-60 hover:opacity-100'} bg-[#1a1c26]`}
              >
                {!readOnly && (
                  <button onClick={(e) => { e.stopPropagation(); onEditBannerId(item, idx); }} className="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 flex items-center justify-center text-white transition-opacity z-10"><Edit3 size={14}/></button>
                )}
                {item.img && item.img.startsWith('http') ? (
                  <div className="w-full h-full bg-cover bg-center" style={{backgroundImage: `url(${item.img})`}}></div>
                ) : (
                  <div className="w-full h-full flex items-center justify-center p-2"><span className="text-[9px] text-slate-400 font-bold truncate">{item.title || item.copy || '비어있음'}</span></div>
                )}
                <div className="absolute bottom-0 left-0 right-0 bg-black/80 text-white text-[8px] px-1 py-0.5 truncate text-center">{item.title || '배너'}</div>
              </div>
            ))}
            {!readOnly && (
              <div onClick={(e) => { e.stopPropagation(); onEditBannerId({ isNew: true }, itemsToRender.length); }} className="flex-shrink-0 w-16 h-16 rounded-lg border border-dashed border-[#44464f] flex items-center justify-center cursor-pointer hover:border-[#7387ff] hover:text-[#7387ff] text-slate-500 transition-colors">
                <Plus size={16}/>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      const [appView, setAppView] = useState('CAMPAIGN_MANAGER'); 
      const [viewMode, setViewMode] = useState('EDITOR');
      const [compareMode, setCompareMode] = useState(false);
      const [showInbox, setShowInbox] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);

      const { gnbList, currentMenuPath, currentMenuId, expandedMenuIds, blocks, originalBlocks, requests, setRequests, handleMenuChange, toggleExpand, addGnb, addSubMenu, moveBlock } = useBtvData(viewMode);

      const [modalState, setModalState] = useState({ isOpen: false, type: null, data: null });

      const handleEditBanner = (data, idx) => {
        // [임시] 프리뷰 에디터용 모달 오픈
        alert("개별 배너 에디터 팝업 로직 호출 (생략됨)");
      };

      return (
        <div className="flex h-screen w-full bg-[#0a0812] text-slate-200 overflow-hidden">
          
          {/* 1. Global Thin Nav (AI Copilot 복구) */}
          <nav className="w-[72px] bg-[#0f111a] border-r border-[#262833] flex flex-col items-center py-6 z-40 shrink-0">
            <div className="w-11 h-11 bg-gradient-to-br from-[#7387ff] to-[#4631e6] rounded-xl flex items-center justify-center mb-8 shadow-lg shadow-[#7387ff]/20">
              <Tv className="text-white" size={24} />
            </div>
            <div className="flex flex-col gap-4 w-full px-3">
              <button onClick={() => setAppView('AI_COPILOT')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'AI_COPILOT' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white'}`} title="AI 코파일럿">
                <Bot size={24} />
              </button>
              <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className={`w-full aspect-square rounded-xl flex items-center justify-center transition-all ${appView === 'CAMPAIGN_MANAGER' ? 'bg-[#262833] text-[#7387ff] shadow-inner' : 'text-slate-500 hover:text-white'}`} title="캠페인 매니저">
                <LayoutTemplate size={24} />
              </button>
            </div>
            <div className="mt-auto w-full px-3"><button className="w-full aspect-square rounded-xl flex items-center justify-center text-slate-500 hover:text-white transition-all"><Settings size={24} /></button></div>
          </nav>

          {appView === 'AI_COPILOT' ? (
            /* AI Copilot View */
            <div className="flex-1 flex flex-col items-center justify-center bg-[#0a0812] animate-in fade-in duration-500">
               <div className="w-20 h-20 bg-[#7387ff]/10 rounded-full flex items-center justify-center mb-6 border border-[#7387ff]/30 shadow-[0_0_40px_rgba(115,135,255,0.1)]">
                 <Sparkles size={40} className="text-[#7387ff] animate-pulse" />
               </div>
               <h2 className="text-2xl font-bold text-white mb-2">AI 프로모션 기획 (준비 중)</h2>
               <p className="text-slate-500 text-center mb-8 text-sm">목적을 입력하면 최적의 배너 조합과 카피를 AI가 제안합니다.</p>
               <button onClick={() => setAppView('CAMPAIGN_MANAGER')} className="px-8 py-3 bg-[#7387ff] hover:bg-[#5b6dbf] text-white rounded-xl font-bold text-sm shadow-lg">수동으로 캠페인 기획하기</button>
            </div>
          ) : (
            <>
              {/* 2. GNB Sidebar (CMS 기능 100% 원복) */}
              <aside className={`${isSidebarOpen ? 'w-64 border-r' : 'w-0 border-none'} flex flex-col border-[#2e3038] bg-[#161820] flex-shrink-0 z-30 transition-all duration-300 overflow-hidden`}>
                <div className="w-64 flex flex-col h-full">
                  <div className="p-4 border-b border-[#2e3038] flex items-center justify-between">
                    <h1 className="text-base font-bold text-white flex items-center gap-2"><Layout size={16} className="text-[#7387ff]"/> B tv 편성 트리</h1>
                    <button onClick={() => setIsSidebarOpen(false)} className="md:hidden text-slate-400 hover:text-white"><X size={18} /></button>
                  </div>
                  <div className="flex-1 overflow-y-auto py-2 custom-scrollbar">
                    {gnbList.map(menu => (
                      <div key={menu.id} className="mb-1">
                        <div className={`flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-white/5 ${currentMenuId === menu.id ? 'bg-[#7387ff]/10 border-l-2 border-[#7387ff]' : 'border-l-2 border-transparent'}`} onClick={() => handleMenuChange(menu.id, menu.name, (menu.children || []).length === 0)}>
                          <div className={`flex-1 flex items-center gap-2 ${currentMenuId === menu.id || (menu.children?.length > 0 && expandedMenuIds.includes(menu.id)) ? 'text-white font-bold' : 'text-slate-400'}`}>
                            <span className="text-sm">{menu.name}</span>
                            {menu.children && menu.children.length > 0 && <span className="ml-auto opacity-50">{expandedMenuIds.includes(menu.id) ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}</span>}
                          </div>
                        </div>
                        {menu.children && menu.children.length > 0 && expandedMenuIds.includes(menu.id) && (
                          <div className="bg-black/20 pb-1">
                            {menu.children.map(child => (
                              <div key={child.id} className={`pl-8 pr-4 py-2 text-xs cursor-pointer hover:bg-white/5 ${currentMenuId === child.id ? 'text-[#7387ff] font-bold' : 'text-slate-500'}`} onClick={() => handleMenuChange(child.id, `${menu.name} > ${child.name}`, true)}>
                                {child.name}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </aside>

              {/* 3. Main Workspace */}
              <main className="flex-1 flex flex-col min-w-0 relative bg-[#0a0812]">
                <header className="h-14 border-b border-[#2e3038] bg-[#100d1d]/95 backdrop-blur flex items-center justify-between px-4 z-20">
                  <div className="flex items-center gap-3 overflow-hidden">
                    {!isSidebarOpen && <button onClick={() => setIsSidebarOpen(true)} className="p-1 text-slate-400 hover:text-white"><Menu size={18}/></button>}
                    <span className="text-[#7387ff] font-bold text-sm tracking-tight">{currentMenuPath}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <select value={viewMode} onChange={(e) => setViewMode(e.target.value)} className="bg-[#191b23] border border-[#2e3038] text-white text-xs font-bold px-3 py-1.5 rounded outline-none">
                      <option value="EDITOR">에디터 모드</option>
                      <option value="REQUEST">UNA (요청함)</option>
                    </select>
                    {viewMode === 'EDITOR' && (
                      <>
                        <button onClick={() => setCompareMode(!compareMode)} className={`px-3 py-1.5 rounded text-xs font-bold transition-all border ${compareMode ? 'bg-orange-500/20 text-orange-400 border-orange-500/50' : 'bg-[#191b23] text-slate-400 border-[#2e3038] hover:text-white'}`}>비교</button>
                        <button onClick={() => setShowInbox(!showInbox)} className={`px-3 py-1.5 rounded text-xs font-bold transition-all border flex items-center gap-1 ${showInbox ? 'bg-[#7387ff] text-white border-[#7387ff]' : 'bg-[#191b23] text-slate-400 border-[#2e3038] hover:text-white'}`}><Inbox size={14}/> Inbox</button>
                        <button onClick={() => setModalState({ isOpen: true, type: 'JIRA_EXPORT' })} className="ml-2 bg-[#4631e6] hover:bg-[#5b4df6] text-white px-4 py-1.5 rounded text-xs font-bold shadow-lg flex items-center gap-1"><Send size={14}/> Jira 전송</button>
                      </>
                    )}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                  <div className={`max-w-[1200px] mx-auto ${compareMode ? 'grid grid-cols-2 gap-8' : ''}`}>
                    {compareMode && (
                      <div><h4 className="text-orange-400 text-sm font-bold mb-4 sticky top-0 bg-[#0a0812]/90 py-2">변경 전 (As-Is)</h4><div className="space-y-6 opacity-70 grayscale-[0.3] pointer-events-none">{originalBlocks.map((block) => <BlockRenderer key={`org-${block.id}`} block={block} isOriginal={true} readOnly={true}/>)}</div></div>
                    )}
                    <div>
                      {compareMode && <h4 className="text-[#7387ff] text-sm font-bold mb-4 sticky top-0 bg-[#0a0812]/90 py-2">변경 후 (To-Be)</h4>}
                      <div className="space-y-6 pb-20">
                        {blocks.map((block, index) => (
                          <BlockRenderer 
                            key={block.id} 
                            block={block} 
                            onUpdate={(id, field, value) => {
                              // 데이터 업데이트 로직 연동
                            }}
                            onEditBannerId={handleEditBanner}
                            onMoveUp={() => moveBlock(index, 'UP')}
                            onMoveDown={() => moveBlock(index, 'DOWN')}
                            isFirst={index === 0}
                            isLast={index === blocks.length - 1}
                          />
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {/* 4. Sliding Inbox Panel (원복) */}
                <div className={`fixed right-0 top-14 bottom-0 w-80 bg-[#161820] border-l border-[#2e3038] shadow-2xl transition-transform duration-300 z-30 flex flex-col ${showInbox ? 'translate-x-0' : 'translate-x-full'}`}>
                  <div className="p-4 border-b border-[#2e3038] bg-[#191b23] flex justify-between items-center">
                    <h3 className="text-sm font-bold text-white flex items-center gap-2"><Inbox size={16} className="text-[#7387ff]" /> 편성 요청함 <span className="bg-red-500 text-white text-[10px] px-1.5 rounded-full">{requests.filter(r=>r.status==='PENDING').length}</span></h3>
                    <button onClick={() => setShowInbox(false)}><X size={16} className="text-slate-500 hover:text-white" /></button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    {requests.map(req => (
                      <div key={req.id} className="bg-[#100d1d] border border-[#2e3038] p-3 rounded-lg hover:border-[#7387ff]/50 cursor-grab active:cursor-grabbing transition-colors group">
                        <div className="flex justify-between items-start mb-2"><span className="text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded flex items-center gap-1"><User size={8}/> {req.requester}</span><span className="text-[10px] text-blue-400 font-bold">대기</span></div>
                        <h4 className="text-sm font-bold text-slate-200 mb-1">{req.title}</h4>
                        <p className="text-[10px] text-slate-500 line-clamp-2">{req.desc}</p>
                        <div className="mt-2 text-[9px] text-[#7387ff] border border-[#7387ff]/30 px-1.5 py-0.5 rounded inline-block">{req.type}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </main>
            </>
          )}

          {/* Jira Export Modal */}
          {modalState.isOpen && modalState.type === 'JIRA_EXPORT' && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-[#12141c] w-[650px] border border-[#262833] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                <div className="p-5 border-b border-[#262833] flex justify-between items-center bg-[#0f111a]"><h3 className="text-base font-extrabold text-white flex items-center gap-2"><Send size={20} className="text-[#4f3df6]" /> Jira 전송 가이드</h3><button onClick={() => setModalState({ isOpen: false })}><X size={18}/></button></div>
                <div className="p-8">
                  <div className="mb-8 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl flex items-center gap-3"><CheckCircle size={20} className="text-blue-400"/><p className="text-xs text-slate-300">데이터 패킹 완료. 우측 화면에 세팅된 <strong className="text-white">{blocks.length}건</strong>의 블록 기획이 전송 준비되었습니다.</p></div>
                  <div className="space-y-6 relative pl-4">
                    <div className="flex gap-4 items-start"><div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-xs font-bold border border-[#303340] text-slate-300 shrink-0">1</div><div><h4 className="text-sm font-bold text-white mb-1">Jira BTVEVT 열기</h4><a href="#" target="_blank" className="inline-flex items-center gap-1.5 text-[11px] bg-[#1a1c26] text-white px-3 py-1.5 rounded-lg border border-[#303340] mt-1 hover:bg-[#262833] transition-all"><ExternalLink size={12} className="text-[#7387ff]"/> 프로젝트 보드 바로가기</a></div></div>
                    <div className="flex gap-4 items-start"><div className="w-8 h-8 rounded-full bg-[#262833] flex items-center justify-center text-xs font-bold border border-[#303340] text-slate-300 shrink-0">2</div><div className="w-full"><h4 className="text-sm font-bold text-white mb-1">B tv 매크로 실행</h4><p className="text-xs text-slate-400">지라 페이지 상단에서 확장 프로그램 아이콘을 클릭하면 일감이 순차 자동 생성됩니다.</p></div></div>
                  </div>
                </div>
                <div className="p-5 bg-[#0f111a] border-t border-[#262833] flex justify-end"><button onClick={() => setModalState({ isOpen: false })} className="px-8 py-2 bg-[#262833] text-white text-xs font-bold rounded-lg transition-colors hover:bg-[#32343d]">닫기</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
